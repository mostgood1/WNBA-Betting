<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recommendations Reconciliation | NBA Betting</title>
  <link rel="stylesheet" href="/web/styles.css?v=20260127-1" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <script>
    function localYMD(){
      const tz = 'America/New_York';
      const cutoffHour = 6; // Treat 12:00am–5:59am ET as the prior NBA slate day.
      try{
        const now = new Date();
        const hourStr = new Intl.DateTimeFormat('en-US', { timeZone: tz, hour:'2-digit', hour12:false }).format(now);
        const hour = Number(hourStr);
        const base = (Number.isFinite(hour) && hour < cutoffHour)
          ? new Date(now.getTime() - 24*60*60*1000)
          : now;
        return new Intl.DateTimeFormat('en-CA', { timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit' }).format(base);
      }catch(_){
        const d=new Date();
        const base = (d.getHours() < cutoffHour) ? new Date(d.getTime() - 24*60*60*1000) : d;
        const y=base.getFullYear();
        const m=String(base.getMonth()+1).padStart(2,'0');
        const day=String(base.getDate()).padStart(2,'0');
        return `${y}-${m}-${day}`;
      }
    }
    function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
    async function fetchJson(url){ const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error(`${r.status} ${r.statusText}`); return await r.json(); }

    function renderBuckets(buckets){
      const order=['Overall','High','Medium','Low'];
      const rows = order.map(k=>{
        const b = buckets && buckets[k] ? buckets[k] : null;
        if(!b) return '';
        const acc = (b.accuracy_pct!=null)? `${b.accuracy_pct}%`:'—';
        const roi = (b.roi_pct!=null)? `${b.roi_pct}%`:'—';
        const wl = `${b.wins||0}-${b.losses||0}${(b.pushes||0)?'-'+(b.pushes||0)+'P':''}`;
        return `<tr><td class="fw-700">${esc(k)}</td><td>${esc(String(b.total??0))}</td><td>${esc(String(b.resolved??0))}</td><td>${esc(wl)}</td><td>${esc(acc)}</td><td>${esc(roi)}</td></tr>`;
      }).join('');
      return `<div class="table-wrap"><table class="data-table"><thead><tr><th>Tier</th><th>Total</th><th>Settled</th><th>W-L-P</th><th>Accuracy</th><th>ROI</th></tr></thead><tbody>${rows||'<tr><td colspan="6">No data.</td></tr>'}</tbody></table></div>`;
    }

    async function load(){
      const d = document.getElementById('datePicker').value;
      const note = document.getElementById('note');
      note.classList.add('hidden'); note.textContent='';

      const gRoot = document.getElementById('gamesRoot');
      const pRoot = document.getElementById('propsRoot');
      gRoot.innerHTML = '<div class="card">Loading…</div>';
      pRoot.innerHTML = '<div class="card">Loading…</div>';
      try{
        const gs = await fetchJson(`/api/evaluate/games?since=${encodeURIComponent(d)}&until=${encodeURIComponent(d)}`);
        const ps = await fetchJson(`/api/evaluate/props?since=${encodeURIComponent(d)}&until=${encodeURIComponent(d)}&regular_only=1`);
        gRoot.innerHTML = `<div class="card"><div class="subtle">Games (date ${esc(d)})</div>${renderBuckets(gs.buckets)}</div>`;
        pRoot.innerHTML = `<div class="card"><div class="subtle">Props (top plays, regular price) (date ${esc(d)})</div>${renderBuckets(ps.buckets)}</div>`;
      }catch(e){
        note.textContent = `Failed to load reconciliation: ${String(e && e.message ? e.message : e)}`;
        note.classList.remove('hidden');
        gRoot.innerHTML = '';
        pRoot.innerHTML = '';
      }
    }

    function applyDate(){
      const d = document.getElementById('datePicker').value;
      const u = new URL(window.location.href);
      u.searchParams.set('date', d);
      window.history.replaceState({},'',u.toString());
      load();
    }

    window.addEventListener('DOMContentLoaded', ()=>{
      const params = new URLSearchParams(window.location.search);
      const d = params.get('date') || localYMD();
      const inp = document.getElementById('datePicker');
      inp.value = d;
      inp.addEventListener('change', applyDate);
      document.getElementById('todayBtn').addEventListener('click', ()=>{ inp.value = localYMD(); applyDate(); });
      load();
    });
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Recommendations Reconciliation</h1>
      <nav class="site-nav">
        <a href="/">Cards</a>
        <a href="/recommendations">Recommendations</a>
        <a href="/reconciliation" aria-current="page">Recs Results</a>
        <a href="/features">Data Features</a>
      </nav>
      <div class="controls">
        <label>Date <input id="datePicker" type="date" /></label>
        <button type="button" id="todayBtn">Today</button>
      </div>
    </div>
  </header>
  <main class="container">
    <div id="note" class="alert hidden"></div>
    <div id="gamesRoot" class="mt-24"></div>
    <div id="propsRoot" class="mt-24"></div>
  </main>
</body>
</html>
