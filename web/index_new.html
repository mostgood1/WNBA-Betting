<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NBA Betting – Cards</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://a.espncdn.com">
  <link rel="dns-prefetch" href="https://a.espncdn.com">
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="NBA game predictions with EV-based betting recommendations" />
  <style>
    :root{
      --bg:#080d1a; --text:#f5f7ff; --muted:#c3cee4; --link:#b8d1ff;
      --input-bg:#121b31; --input-br:#243356; --button-bg:#1b2339; --button-br:#2a3a63; --button-text:#e6edf7;
      --card:#0d1426; --card2:#121b31; --border:#243356;
      --row1:#0f1629; --row2:#121b31; --th:#0f1629; --table-br:#243356;
      --pill-bg:#101a2e; --pill-br:#2a3a63;
    }
    body.light{
      --bg:#ffffff; --text:#0a1020; --muted:#475569; --link:#1e3a8a;
      --input-bg:#ffffff; --input-br:#94a3b8; --button-bg:#f1f5f9; --button-br:#94a3b8; --button-text:#0a1020;
      --card:#f8fafc; --card2:#f1f5fb; --border:#cbd5e1;
      --row1:#f8fafc; --row2:#eef2f7; --th:#e2e8f0; --table-br:#cbd5e1;
      --pill-bg:#eef3fb; --pill-br:#94a3b8;
    }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin:0; background:var(--bg); color:var(--text); }
    .container{ max-width: 1200px; margin: 32px auto; padding: 0 16px; }
    h1{ font-size: 26px; margin: 0 0 16px; }
    .nav{ font-size: 14px; margin-bottom: 10px; }
    .nav a { color: var(--link); text-decoration: none; margin-right: 10px; }
    .nav button.theme-toggle{ background: var(--button-bg); color: var(--button-text); border: 1px solid var(--button-br); border-radius: 6px; padding: 6px 10px; cursor: pointer; }
    .theme-toggle{ background: var(--button-bg); color: var(--button-text); border: 1px solid var(--button-br); border-radius: 6px; padding: 6px 10px; cursor: pointer; }
    .meta{ color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .filters{ display: flex; gap: 8px; align-items: center; margin: 12px 0 16px; flex-wrap: wrap; }
    .filters input, .filters select { background: var(--input-bg); border: 1px solid var(--input-br); color: var(--text); padding: 6px 8px; border-radius: 6px; }
    .filters button, .filters a.btn { background: var(--button-bg); color: var(--button-text); border: 1px solid var(--button-br); border-radius: 6px; padding: 6px 10px; cursor:pointer; text-decoration:none; }
    .cards-summary{ display: flex; flex-wrap: wrap; gap: 12px; margin: 12px 0; align-items: stretch; }
    .card{ background: linear-gradient(180deg, var(--card), var(--card2)); border: 1px solid var(--border); border-radius: 14px; padding: 12px; box-shadow: 0 10px 24px rgba(0,0,0,.35); }
    .card-summary{ flex: 1; min-width: 240px; padding: 10px; background: linear-gradient(180deg, #132a52, #0d1426); }
    .card-tier{ flex: 1; min-width: 200px; padding: 10px; }
    .title-sm{ font-size: 14px; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); }
    .title-lg{ font-size: 20px; font-weight: 600; }
    .title-md{ font-size: 18px; font-weight: 600; }
    .muted-small{ font-size: 12px; color: var(--muted); }
    .muted-tiny{ font-size: 11px; color: var(--muted); }
    .mt-4{ margin-top: 4px; }
    .ml-8{ margin-left: 8px; }
    .grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-top: 16px; }
    @media (max-width: 760px){ .grid{ grid-template-columns: 1fr; } .container{ padding: 0 10px; margin: 12px auto; } h1{ font-size: 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav"><a href="/">Cards</a> | <a href="/recommendations">Recommendations</a> | <a href="/props">Props</a> | <a href="/props/recommendations">Props Recs</a> | <a href="/reconciliation">Reconciliation</a> | <a href="/odds-coverage">Odds Coverage</a> | <button type="button" class="theme-toggle" id="themeToggle" title="Toggle light/dark">Toggle Theme</button> | <button type="button" class="theme-toggle" id="toggleAllOdds" title="Toggle all odds display">Hide All Odds</button></div>
    <h1>NBA Betting – Cards</h1>
    
    <div class="meta" id="seasonMeta">Loading...</div>
    
    <!-- Summary cards will go here -->
    <div id="cardsSummary" class="cards-summary"></div>
    
    <form class="filters" method="get" action="/">
      <label>Date: <input type="date" name="date" id="datePicker" /></label>
      <label>Sort:
        <select name="sort" id="sortSelect">
          <option value="date">Date/Time</option>
          <option value="winner">Winner EV</option>
          <option value="ats">ATS Edge</option>
          <option value="total">Total Edge</option>
        </select>
      </label>
      <button type="submit">Apply</button>
      <a href="/">Reset</a>
      <a href="/api/refresh-data" class="ml-8" title="Rebuild predictions (server-side)">Refresh Data</a>
      <a href="/api/refresh-odds" class="ml-8" title="Fetch real odds and rebuild">Refresh Odds</a>
    </form>

    <div id="cards" class="grid"></div>
    
    <div class="meta" style="margin-top:24px" id="footerMeta"></div>
  </div>
  
  <script src="/web/app.js?v=20251005-2"></script>
  <script>
    // Theme toggle
    (function(){
      try{
        var body = document.body;
        var saved = localStorage.getItem('theme');
        if (saved === 'light') { body.classList.add('light'); }
        var tbtn = document.getElementById('themeToggle');
        if (tbtn) {
          tbtn.addEventListener('click', function(){
            body.classList.toggle('light');
            localStorage.setItem('theme', body.classList.contains('light') ? 'light' : 'dark');
          });
        }
      } catch(e){}
    })();
    
    // Initialize date picker to today
    (function(){
      const inp = document.getElementById('datePicker');
      if (inp && !inp.value) {
        const params = new URLSearchParams(window.location.search);
        const dateParam = params.get('date');
        if (dateParam) {
          inp.value = dateParam;
        } else {
          const today = new Date();
          inp.value = today.toISOString().slice(0, 10);
        }
      }
    })();
    
    // Fetch footer metadata
    (async function(){
      try{
        const r = await fetch('/api/cron/meta');
        if (!r.ok) return;
        const j = await r.json();
        const el = document.getElementById('footerMeta');
        if (!el) return;
        let txt = 'Last update: —';
        const last = j && (j.last_refresh_bovada || null);
        if (last && last.timestamp){
          txt = `Odds: ${new Date(last.timestamp).toLocaleString()}`;
          if (last.date) txt += ` • ${last.date}`;
        } else if (j && j.fallback_odds_latest && j.fallback_odds_latest.mtime){
          txt = `Odds: ${new Date(j.fallback_odds_latest.mtime).toLocaleString()}`;
        }
        el.textContent = txt;
      } catch(_){ /* ignore */ }
    })();
  </script>
</body>
</html>
