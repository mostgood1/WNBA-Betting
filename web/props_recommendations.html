<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NBA Props Recommendations</title>
  <link rel="stylesheet" href="/web/styles.css" />
  <style>
    .pill{display:inline-block;border:1px solid #25316a;border-radius:999px;padding:2px 6px;font-size:12px;margin-left:6px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    @media (max-width:760px){ .grid{grid-template-columns:1fr} }
    .card-head{display:flex;align-items:center;gap:10px}
    .avatar{width:56px;height:56px;border-radius:8px;object-fit:cover;background:#0f1530;border:1px solid #25316a}
    .team-logo{width:28px;height:28px}
    .muted{color:#9fb0ff;font-size:12px}
    .plays{display:grid;gap:6px}
    .play{display:flex;justify-content:space-between;align-items:center;border:1px solid #25316a;border-radius:10px;padding:8px 10px;background:#0f1530}
    .edge{color:#facc15}
    .ev{color:#86efac}
    .ladder{margin-top:6px;border:1px solid #25316a;border-radius:10px;padding:6px 8px;background:#101735}
    .ladder h4{margin:0 0 6px 0;font-size:12px;color:#d5dbff}
    .ladder-entries{display:flex;flex-wrap:wrap;gap:6px}
    .ladder-entries .pill{background:#0f1530}
  </style>
  <script>
  function fmt(x){ if(x==null||isNaN(x)) return '—'; return Number(x).toFixed(1) }
    function qs(name){ const u=new URL(window.location); return u.searchParams.get(name) }
    async function loadData(){
  const d = document.getElementById('datePicker').value || qs('date');
  const market = document.getElementById('market').value;
  const g = document.getElementById('game').value;
      const onlyEV = document.getElementById('onlyEV').checked;
      const minEV = document.getElementById('minEV').value;
      const params = new URLSearchParams();
      if(d) params.set('date', d);
      if(market) params.set('market', market);
      if(onlyEV) params.set('onlyEV','1');
      if(minEV) params.set('minEV', String(minEV));
  if(g){ const [home,away] = g.split('|'); if(home) params.set('home_team', home); if(away) params.set('away_team', away); }
      const res = await fetch('/api/props/recommendations?'+params.toString(), {cache:'no-store'});
      const js = await res.json();
      document.getElementById('status').textContent = js.rows? (js.rows+" players") : (js.note || 'No props yet.');
      renderGames(js.games||[]);
      renderCards(js.data||[]);
    }
    function renderGames(games){
      const sel = document.getElementById('game'); const cur = sel.value;
      sel.innerHTML = '<option value="">All games</option>';
      games.forEach(g=>{ const opt=document.createElement('option'); opt.value=`${g.home_team||''}|${g.away_team||''}`; opt.textContent=`${g.away_team||'?'} @ ${g.home_team||'?'}`; sel.appendChild(opt); });
      if(cur) sel.value = cur;
    }
    function renderCards(items){
      const root = document.getElementById('cards'); root.innerHTML='';
      items.forEach(it=>{
        const div = document.createElement('div'); div.className='card';
        const matchup = ((it.away_team||'') && (it.home_team||''))? `${it.away_team} @ ${it.home_team}` : '';
        const head = document.createElement('div'); head.className='card-head';
        const avatar = document.createElement('img'); avatar.className='avatar'; avatar.alt = it.player||''; if(it.photo){ avatar.src = it.photo; } else { avatar.style.display='none'; }
        const tlogo = document.createElement('img'); tlogo.className='team-logo'; if(it.team_logo){ tlogo.src = it.team_logo; tlogo.alt = it.team||''; } else { tlogo.style.display='none'; }
        const title = document.createElement('div'); title.innerHTML = `<div style="font-weight:700">${it.player||''}</div><div class="muted">${it.team? it.team : ''} ${matchup? '• '+matchup : ''}</div>`;
        head.appendChild(avatar); head.appendChild(title); head.appendChild(tlogo);

        const playsWrap = document.createElement('div'); playsWrap.className='plays';
        (it.plays||[]).forEach(p=>{
          const row = document.createElement('div'); row.className='play';
          const ev = (p.ev!=null && !isNaN(p.ev))? `<span class=\"ev\">EV ${fmt(p.ev)}</span>` : '';
          const edge = (p.edge!=null && !isNaN(p.edge))? `<span class="edge">Δ ${fmt(p.edge)}</span>` : '';
          row.innerHTML = `<div>${(p.market||'').toUpperCase()} ${p.side||''} ${p.line!=null? p.line: ''}</div><div>${edge} ${ev} <span class="pill">${p.price!=null? p.price: ''}</span> <span class="pill">${p.book||''}</span></div>`;
          playsWrap.appendChild(row);
        });

        // Consolidated ladders section
        const ladders = it.ladders || [];
        ladders.forEach(l => {
          const sec = document.createElement('div'); sec.className='ladder';
          const title = (l.market? l.market.toUpperCase() : '') + (l.side? ' '+l.side : '');
          sec.innerHTML = `<h4>${title} Ladder</h4>`;
          const inner = document.createElement('div'); inner.className='ladder-entries';
          (l.entries||[]).forEach(e=>{
            const pill = document.createElement('span'); pill.className='pill';
            pill.textContent = `${e.line ?? ''} @ ${e.price ?? ''}${(e.ev_pct!=null && !isNaN(e.ev_pct))? ' • EV% '+fmt(e.ev_pct): ''}${e.book? ' • '+e.book: ''}`;
            inner.appendChild(pill);
          });
          sec.appendChild(inner);
          playsWrap.appendChild(sec);
        });

        // Model baseline row (if available)
        if (it.model && Object.keys(it.model).length>0){
          const row = document.createElement('div'); row.className='play';
          row.innerHTML = `<div><span class="model-badge">MODEL</span></div><div class="muted">PTS ${fmt(it.model.pts)} • REB ${fmt(it.model.reb)} • AST ${fmt(it.model.ast)} • 3PM ${fmt(it.model.threes)} • PRA ${fmt(it.model.pra)}</div>`;
          playsWrap.appendChild(row);
        }

        div.appendChild(head); div.appendChild(playsWrap); root.appendChild(div);
      });
    }
    window.addEventListener('DOMContentLoaded', ()=>{
      function localYMD(){ const d=new Date(); const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
      const paramDate = (new URL(window.location)).searchParams.get('date');
      const today = localYMD();
      const inp = document.getElementById('datePicker'); if(!inp.value) inp.value = (paramDate || today);
      ['datePicker','market','onlyEV','minEV','game'].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('change', loadData); });
      loadData();
    });
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Props Recs</h1>
      <nav class="site-nav">
        <a href="/">Games</a>
        <a href="/recommendations">Recommendations</a>
        <a href="/props">Props</a>
        <a href="/props/recommendations" aria-current="page">Props Recs</a>
        <a href="/reconciliation">Reconciliation</a>
        <a href="/odds-coverage">Odds Coverage</a>
      </nav>
      <div class="controls">
        <label for="datePicker">Date</label>
        <input id="datePicker" type="date" title="Select date" />
        <label for="game">Game</label>
        <select id="game" title="Filter by game">
          <option value="">All games</option>
        </select>
        <label for="market">Market</label>
        <select id="market" title="Filter by market">
          <option value="">All markets</option>
          <option value="pts">Points</option>
          <option value="reb">Rebounds</option>
          <option value="ast">Assists</option>
          <option value="threes">3PM</option>
        </select>
        <label><input id="onlyEV" type="checkbox" /> Only EV</label>
        <label for="minEV">Min EV%</label> <input id="minEV" type="number" step="0.1" placeholder="0.0" title="Minimum EV percent" />
      </div>
    </div>
  </header>
  <main class="container">
    <div id="status" class="summary muted">Loading…</div>
    <div id="cards" class="grid"></div>
  </main>
</body>
</html>
