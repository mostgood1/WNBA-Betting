<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legacy Props Redirect</title>
  <meta http-equiv="refresh" content="0; url=/betting-card?section=props" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 0; background: #0b1220; color: #e8eefc; }
    main { max-width: 720px; margin: 72px auto; padding: 24px; }
    .card { background: #101a2c; border: 1px solid #2f4564; border-radius: 14px; padding: 20px; }
    a { color: #b8d1ff; }
    .muted { color: #aab9d6; font-size: 14px; }
  </style>
  <script>
    (function () {
      const target = '/betting-card?section=props' + (window.location.search ? '&' + window.location.search.slice(1) : '');
      window.location.replace(target);
    }());
  </script>
</head>
<body>
  <main>
    <div class="card">
      <h1>Moved to Betting Card</h1>
      <p class="muted">This legacy props recommendations page has been retired. Use the props section of the betting card instead.</p>
      <p><a href="/betting-card?section=props">Open Props Betting Card</a></p>
    </div>
  </main>
</body>
</html>
