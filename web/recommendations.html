<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NBA Betting – Recommendations</title>
  <meta name="description" content="Unified betting recommendations (ML, ATS, TOTAL, Props)." />
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://a.espncdn.com">
  <link rel="dns-prefetch" href="https://a.espncdn.com">
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{--bg:#080d1a;--card:#0d1426;--card2:#121b31;--text:#f5f7ff;--muted:#c3cee4;--border:#243356;--link:#b8d1ff;--pill-bg:#101a2e;--pill-br:#2a3a63;--badge-bg:#162247;--badge-br:#2a3a63}
    body.light{--bg:#ffffff;--card:#f8fafc;--card2:#f1f5fb;--text:#0a1020;--muted:#475569;--border:#cbd5e1;--link:#1e3a8a;--pill-bg:#eef3fb;--pill-br:#94a3b8;--badge-bg:#e2e8f0;--badge-br:#94a3b8}
    body{font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:var(--bg);color:var(--text)}
    .container{max-width:1100px;margin:24px auto;padding:0 16px}
    a{color:var(--link)} h1{margin:0 0 12px;font-size:26px}
    .nav{font-size:14px;margin-bottom:10px} .nav a{color:var(--link);text-decoration:none;margin-right:10px}
    .nav button.theme-toggle{background:var(--pill-bg);color:var(--text);border:1px solid var(--pill-br);border-radius:6px;padding:6px 10px;cursor:pointer}
    .cards-summary{display:flex;flex-wrap:wrap;gap:12px;margin:12px 0;align-items:stretch}
    .card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:0 10px 24px rgba(0,0,0,.35)}
    .card-summary{flex:1;min-width:240px;padding:10px;background:linear-gradient(180deg,#132a52,#0d1426)}
    .card-tier{flex:1;min-width:200px;padding:10px}
    .title-sm{font-size:14px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
    .title-lg{font-size:20px;font-weight:600} .title-md{font-size:18px;font-weight:600}
    .muted-small{font-size:12px;color:var(--muted)} .muted-tiny{font-size:11px;color:var(--muted)}
    table{width:100%;border-collapse:collapse} th,td{padding:8px} thead th{text-align:left;border-bottom:1px solid var(--border)} tbody tr{border-top:1px solid var(--border)}
    .pill{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:999px;border:1px solid var(--pill-br);background:var(--pill-bg);font-size:12px}
    .pill-low{color:#fde68a;border-color:#854d0e} .pill-medium{color:#93c5fd;border-color:#1e3a8a} .pill-high{color:#9ae6b4;border-color:#2e8b57}
    .res{display:inline-block;padding:2px 6px;border-radius:6px;border:1px solid var(--border)}
    .res-win{border-color:#2e8b57;color:#9ae6b4} .res-loss{border-color:#8b2e2e;color:#fca5a5} .res-push{border-color:#2a3a63;color:#c3cee4}
    .day-good{border-color:#2e8b57}
    .day-bad{border-color:#8b2e2e}
    .day-good summary .title-md{color:#9ae6b4}
    .day-bad summary .title-md{color:#fca5a5}
    .day-net{font-weight:600}
    .day-net.good{color:#9ae6b4}
    .day-net.bad{color:#fca5a5}
    form.filters{margin:8px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  form.filters input, form.filters select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px}
  .w-70{width:70px}
    form.filters button, form.filters a{background:var(--pill-bg);color:var(--text);border:1px solid var(--pill-br);border-radius:6px;padding:6px 10px;text-decoration:none;font-size:13px;cursor:pointer}
    .ml-8{margin-left:8px}
    .ml-12{margin-left:12px}
    .tar{text-align:right} .mt-1{margin-top:1rem} .mt-4{margin-top:4px} .lh-13{line-height:1.3}
    /* Game cards: one per row (full width) */
    .game-card{flex:1 1 100%; width:100%; min-width:100%}
    .table-wrap{overflow-x:auto}
    .summary-note{font-size:12px;color:var(--muted);margin-top:8px}
    /* Sortable table headers */
    .th-sortable{cursor:pointer;-webkit-user-select:none;-ms-user-select:none;user-select:none}
    .th-sort-ind{margin-left:4px;color:var(--muted);font-size:11px}
    /* Team logos and badges */
    .team-badge{display:inline-flex;align-items:center;gap:6px;vertical-align:middle}
    .team-logo{width:20px;height:20px;object-fit:contain;image-rendering:-webkit-optimize-contrast;border-radius:2px}
    .color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:1px solid var(--border)}
    .team-text{font-weight:600}
    @media (max-width:760px){ .container{padding:0 10px;margin:12px auto} h1{font-size:20px;margin-bottom:6px} .nav{font-size:12px;overflow-x:auto;white-space:nowrap;padding-bottom:4px} .nav a{display:inline-block;margin-right:6px} table{font-size:12px} th,td{padding:6px 4px} thead th{font-size:11px} form.filters input, form.filters select{padding:4px 6px;font-size:12px} form.filters button{padding:4px 8px;font-size:12px} .pill{font-size:10px;padding:2px 6px;margin-left:4px} }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav"><a href="/">Cards</a> | <a href="/recommendations" aria-current="page">Recommendations</a> | <a href="/reconciliation">Recs Results</a> | <a href="/features">Data Features</a> | <button type="button" class="theme-toggle" id="themeToggle" title="Toggle light/dark">Toggle Theme</button></div>
    <h1>NBA Betting – Recommendations</h1>
    <form class="filters" id="filters" onsubmit="event.preventDefault(); loadRecs();">
      <label>Date: <input type="date" id="datePicker" /></label>
  <label>Min ATS edge <input type="number" id="minSpread" step="0.1" value="1.0" class="w-70" /></label>
  <label>Min Total edge <input type="number" id="minTotal" step="0.1" value="1.5" class="w-70" /></label>
      <label>Sort by:
        <select id="sortBy">
          <option value="confidence">Confidence</option>
          <option value="time">Game time</option>
          <option value="type">Bet type</option>
          <option value="ev">EV</option>
          <option value="edge">Edge</option>
          <option value="sim_score">Sim Score</option>
          <option value="sim_ev">Sim EV</option>
          <option value="sim_prob">Sim Prob</option>
        </select>
      </label>
      <label class="ml-8">Prop markets:
        <label><input type="checkbox" class="prop-mkt" value="pts" checked /> Pts</label>
        <label><input type="checkbox" class="prop-mkt" value="reb" checked /> Reb</label>
        <label><input type="checkbox" class="prop-mkt" value="ast" checked /> Ast</label>
        <label><input type="checkbox" class="prop-mkt" value="threes" checked /> 3PT</label>
        <label><input type="checkbox" class="prop-mkt" value="pra" /> PRA</label>
      </label>
  <button type="submit">Apply</button>
      <button type="button" id="resetBtn">Reset</button>
    </form>
  <div class="muted-small banner-small" id="seasonBanner">Last 30 days</div>
  <div id="cardsSummary" class="cards-summary"></div>
  <h2 class="mt-1">Daily Recaps</h2>
  <div class="muted-small">Last 30 days of results (games + props) when reconciliation files exist.</div>
  <div id="dailyRecapsRoot" class="cards-summary"></div>
  </div>
  <script>
    // Global error handler: surface JS exceptions as a visible card to avoid blank page
    window.addEventListener('error', function(ev){
      try{
        const root = document.getElementById('dailyRecapsRoot') || document.getElementById('cardsSummary');
        if(root){
          const msg = (ev && ev.error && ev.error.message) ? ev.error.message : (ev && ev.message ? ev.message : 'Unknown error');
          root.innerHTML = `<div class="card">An error occurred while rendering: ${String(msg)}</div>`;
        }
      }catch(_){ /* ignore */ }
    });
    (function(){ try{ const body=document.body; const saved=localStorage.getItem('theme'); if(saved==='light') body.classList.add('light'); const t=document.getElementById('themeToggle'); if(t){ t.addEventListener('click',()=>{ body.classList.toggle('light'); localStorage.setItem('theme', body.classList.contains('light')?'light':'dark'); }); }}catch(e){} })();
    // Format schedule start times to clean display; hide placeholders
    function formatDisplayTime(s){
      try{
        const str = String(s||'').trim();
        if(!str) return '';
        // If already in "h:mm am/pm" form, append ET and normalize spacing
        const m = str.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/i);
        if(m){ const hh=m[1], mm=m[2], ap=m[3].toUpperCase(); return `${hh}:${mm} ${ap} ET`; }
        // Hide known placeholder dates
        if(/1900-01-01/i.test(str)) return '';
        // Try parsing ISO and format to ET
        const d = new Date(str);
        if(!isNaN(d.getTime())){
          const fmt = new Intl.DateTimeFormat('en-US', { hour:'numeric', minute:'2-digit', timeZone:'America/New_York', hour12:true });
          return fmt.format(d)+ ' ET';
        }
        return '';
      }catch(_){ return ''; }
    }
    function localYMD(){
      try{ return new Intl.DateTimeFormat('en-CA', { timeZone:'America/New_York', year:'numeric', month:'2-digit', day:'2-digit' }).format(new Date()); }
      catch(_){ const d=new Date(); return d.toISOString().slice(0,10); }
    }
    function qs(name){ try{ return new URL(window.location).searchParams.get(name); }catch(_){ return null; } }

    // API base: if opened from file:// or VS Code preview, relative /api/* calls can fail.
    // Default to localhost so the page still works.
    const API_BASE = (()=>{
      try{
        const proto = String(window.location && window.location.protocol || '');
        const origin = String(window.location && window.location.origin || '');
        if(proto === 'file:' || origin === 'null' || !origin.startsWith('http')) return 'http://127.0.0.1:5051';
        return origin;
      }catch(_){
        return 'http://127.0.0.1:5051';
      }
    })();
    function apiUrl(path){
      const s = String(path||'');
      if(!s) return API_BASE;
      if(/^https?:\/\//i.test(s)) return s;
      return API_BASE + (s.startsWith('/') ? s : ('/' + s));
    }
    function impliedConfidence(rec){ // heuristic bucket using edge / ev magnitudes
      if(rec.market==='ML' && rec.ev!=null){ if(rec.ev>=0.04) return 'High'; if(rec.ev>=0.02) return 'Medium'; return 'Low'; }
      if((rec.market==='ATS' || rec.market==='TOTAL') && rec.edge!=null){ const a=Math.abs(rec.edge); if(a>=4.0) return 'High'; if(a>=2.0) return 'Medium'; return 'Low'; }
      return 'Low'; }
    function pillClass(c){ return c==='High'?'pill-high': (c==='Medium'?'pill-medium':'pill-low'); }
    function confidenceDisplay(c){
      if(c==='High') return 'High $100';
      if(c==='Medium') return 'Medium $50';
      return 'Low $25';
    }
    function fmtEV(ev){ if(ev==null || isNaN(ev)) return ''; return (ev*100).toFixed(1)+'%'; }
    function fmtEdge(e){ if(e==null || isNaN(e)) return ''; return Number(e).toFixed(2); }
    function fmtOddsAmerican(x){
      if(x==null || x==='') return '';
      const n = Number(x);
      if(!Number.isFinite(n)) return '';
      const v = Math.round(n);
      return v>0 ? ('+'+v) : String(v);
    }
    // Team metadata for logos and colors
    const TEAM_NAME_TO_TRI = {
      "Atlanta Hawks": "ATL","Boston Celtics": "BOS","Brooklyn Nets": "BKN","Charlotte Hornets": "CHA","Chicago Bulls": "CHI","Cleveland Cavaliers": "CLE","Dallas Mavericks": "DAL","Denver Nuggets": "DEN","Detroit Pistons": "DET","Golden State Warriors": "GSW","Houston Rockets": "HOU","Indiana Pacers": "IND","Los Angeles Clippers": "LAC","Los Angeles Lakers": "LAL","Memphis Grizzlies": "MEM","Miami Heat": "MIA","Milwaukee Bucks": "MIL","Minnesota Timberwolves": "MIN","New Orleans Pelicans": "NOP","New York Knicks": "NYK","Oklahoma City Thunder": "OKC","Orlando Magic": "ORL","Philadelphia 76ers": "PHI","Phoenix Suns": "PHX","Portland Trail Blazers": "POR","Sacramento Kings": "SAC","San Antonio Spurs": "SAS","Toronto Raptors": "TOR","Utah Jazz": "UTA","Washington Wizards": "WAS"
    };
    const TEAM_META = { ATL:{color:"#E03A3E"}, BOS:{color:"#007A33"}, BKN:{color:"#000000"}, CHA:{color:"#00788C"}, CHI:{color:"#CE1141"}, CLE:{color:"#6F263D"}, DAL:{color:"#00538C"}, DEN:{color:"#0E2240"}, DET:{color:"#C8102E"}, GSW:{color:"#1D428A"}, HOU:{color:"#CE1141"}, IND:{color:"#002D62"}, LAC:{color:"#C8102E"}, LAL:{color:"#552583"}, MEM:{color:"#5D76A9"}, MIA:{color:"#98002E"}, MIL:{color:"#00471B"}, MIN:{color:"#0C2340"}, NOP:{color:"#0C2340"}, NYK:{color:"#006BB6"}, OKC:{color:"#007AC1"}, ORL:{color:"#0077C8"}, PHI:{color:"#006BB6"}, PHX:{color:"#E56020"}, POR:{color:"#E03A3E"}, SAC:{color:"#5A2D81"}, SAS:{color:"#000000"}, TOR:{color:"#CE1141"}, UTA:{color:"#002B5C"}, WAS:{color:"#E31837"} };
    function teamTri(nameOrTri){ if(!nameOrTri) return null; const s=String(nameOrTri).trim(); const upper=s.toUpperCase(); if(TEAM_META[upper]) return upper; const tri=TEAM_NAME_TO_TRI[s] || TEAM_NAME_TO_TRI[s.replace(/\s+/g,' ').trim()]; return tri||null; }
    function teamLogoUrl(tri){ if(!tri) return null; return `https://a.espncdn.com/i/teamlogos/nba/500/${tri.toLowerCase()}.png`; }
    function teamBadge(nameOrTri){ const tri=teamTri(nameOrTri); const meta=tri?TEAM_META[tri]:null; const logo=tri?teamLogoUrl(tri):null; const color=meta?meta.color:'#667085'; const text=(typeof nameOrTri==='string')? nameOrTri: (tri||''); const dot=`<span class="color-dot" style="background:${color}"></span>`; const img=logo? `<img class="team-logo" src="${logo}" alt="${tri}" onerror="this.style.display='none'">`:''; return `<span class="team-badge">${img}${dot}<span class="team-text" style="color:${color}">${text}</span></span>`; }
    function parseDateStr(d){ try{ return new Date(d+'T00:00:00'); }catch(_){ return null; } }

    // ---- Display caps (score-only selection) ----
    // These caps are applied before rendering, independent of the UI sort dropdown.
    // Goal: show a concise “best slate” by score.
    const MAX_GAME_PICKS = 10;
    const MAX_PROP_PICKS = 25;

    function capGamesByScore(games){
      try{
        if(!Array.isArray(games) || !games.length) return [];
        // De-dupe: max 1 pick per game (choose highest score)
        const byGame = new Map();
        games.forEach(r=>{
          const gid = (r && r.game_id!=null && String(r.game_id).trim()!=='')
            ? String(r.game_id)
            : (r && r.matchup ? String(r.matchup) : JSON.stringify([r.away,r.home]));
          const prev = byGame.get(gid);
          const s = Number(r && r.score!=null ? r.score : 0);
          const ps = Number(prev && prev.score!=null ? prev.score : 0);
          if(!prev || s > ps){ byGame.set(gid, r); }
        });
        const arr = Array.from(byGame.values());
        arr.sort((a,b)=> Number(b.score||0) - Number(a.score||0));
        return arr.slice(0, MAX_GAME_PICKS);
      }catch(_){
        return Array.isArray(games)? games.slice(0, MAX_GAME_PICKS) : [];
      }
    }

    function capPropsByScore(props){
      try{
        if(!Array.isArray(props) || !props.length) return [];
        // De-dupe: max 1 prop per player (choose highest score)
        const byPlayer = new Map();
        props.forEach(r=>{
          const key = String(r.player||r.player_name||'').trim().toLowerCase() + '@@' + String(r.team||'').trim().toUpperCase();
          const prev = byPlayer.get(key);
          const s = Number(r && r.score!=null ? r.score : 0);
          const ps = Number(prev && prev.score!=null ? prev.score : 0);
          if(!prev || s > ps){ byPlayer.set(key, r); }
        });
        const arr = Array.from(byPlayer.values());
        arr.sort((a,b)=> Number(b.score||0) - Number(a.score||0));
        return arr.slice(0, MAX_PROP_PICKS);
      }catch(_){
        return Array.isArray(props)? props.slice(0, MAX_PROP_PICKS) : [];
      }
    }
    async function loadRecs(){
      // Page is intentionally limited to 30-day summary + Daily Recaps.
      // Everything after Daily Recaps has been removed.

      // Immediate feedback so the page never looks blank.
      try{
        const cs = document.getElementById('cardsSummary');
        if(cs){ cs.innerHTML = '<div class="card">Loading 30-day summary…</div>'; }
        const dr = document.getElementById('dailyRecapsRoot');
        if(dr){ dr.innerHTML = '<div class="card">Loading daily recaps…</div>'; }
      }catch(_){ /* ignore */ }

      try{ await renderSummary(); }catch(_){
        const cs=document.getElementById('cardsSummary');
        if(cs){ cs.innerHTML='<div class="card">Failed to load 30-day summary.</div>'; }
      }
      try{ await renderDailyRecaps(); }catch(_){
        const dr=document.getElementById('dailyRecapsRoot');
        if(dr){ dr.innerHTML='<div class="card">Failed to load daily recaps.</div>'; }
      }
    }

    async function loadGameCards(date, propMkts, regularOnly){
      const root = document.getElementById('gameCardsRoot');
      if(!root) return;
      root.innerHTML = '';
      try{
        const stats = Array.isArray(propMkts) && propMkts.length ? propMkts.join(',') : 'pts,reb,ast,threes,pra';
        const url = apiUrl(`/recommendations?format=json&view=game-cards&date=${encodeURIComponent(date)}&props_top=3&prop_stats=${encodeURIComponent(stats)}&regular_only=${regularOnly?1:0}&include_recon=1`);
        const r = await fetch(url, {cache:'no-store'});
        if(!r.ok){ throw new Error(`HTTP ${r.status}`); }
        const js = await r.json();
        const cards = Array.isArray(js.cards) ? js.cards : [];
        const meta = js.meta || {};
        if(!cards.length){
          root.innerHTML = '<div class="card">No game cards available for this date.</div>';
          return;
        }
        if(meta.props_fallback_used){
          const note = document.createElement('div');
          note.className = 'card';
          const relaxed = !!meta.props_fallback_relaxed_price_filter;
          const msg = relaxed
            ? 'No standard stat props found for the selected categories; showing DD/TD markets instead (price filter relaxed to avoid blank cards).'
            : 'No standard stat props found for the selected categories; showing DD/TD markets instead.';
          note.innerHTML = `<div class="title-sm">Props note</div><div class="muted-small">${msg}</div>`;
          root.appendChild(note);
        }
        renderGameCards(cards);
      }catch(e){
        const msg = (e && (e.message || String(e))) ? (e.message || String(e)) : 'Unknown error';
        root.innerHTML = `<div class="card">Failed to load game cards.<div class="muted-small">${String(msg)}</div></div>`;
      }
    }

    function fmtNum(x, digits){
      const n = Number(x);
      if(!Number.isFinite(n)) return '';
      const d = (digits==null)? 1 : digits;
      return n.toFixed(d);
    }
    function fmtSigned1(x){
      const n = Number(x);
      if(!Number.isFinite(n)) return '';
      const s = n>=0 ? '+' : '';
      return s + n.toFixed(1);
    }
    function propLabel(p){
      const st = String(p.stat||'').toUpperCase();
      const side = String(p.side||'');
      const line = (p.line!=null && Number.isFinite(Number(p.line))) ? Number(p.line).toFixed(1) : '';
      if(side==='YES') return `${st} YES`;
      if(side==='NO') return `${st} NO`;
      if(side==='OVER') return `OVER ${line} ${st}`;
      if(side==='UNDER') return `UNDER ${line} ${st}`;
      return `${side} ${line} ${st}`.trim();
    }
    function pickLine(p){
      if(!p) return '';
      const m = String(p.market||'');
      if(m==='ML'){
        const side = String(p.side||'');
        const price = fmtOddsAmerican(p.price);
        const ev = (p.ev!=null)? fmtEV(p.ev): '';
        return `${side} ML${price?` (${price})`:''}${ev?` · EV ${ev}`:''}`;
      }
      if(m==='ATS'){
        const side = String(p.side||'');
        const ln = (p.line!=null && Number.isFinite(Number(p.line))) ? Number(p.line) : null;
        const lineDisp = (ln==null)? '' : (ln>0? `+${ln}` : `${ln}`);
        const edge = (p.edge!=null)? fmtSigned1(p.edge): '';
        return `${side} ${lineDisp}${edge?` · edge ${edge}`:''}`;
      }
      if(m==='TOTAL'){
        const side = String(p.side||'');
        const ln = (p.line!=null && Number.isFinite(Number(p.line))) ? Number(p.line) : null;
        const edge = (p.edge!=null)? fmtSigned1(p.edge): '';
        return `${side}${ln!=null?` ${ln}`:''}${edge?` · edge ${edge}`:''}`;
      }
      return '';
    }
    function renderGameCards(cards){
      const root = document.getElementById('gameCardsRoot');
      if(!root) return;
      root.innerHTML = '';
      cards.forEach(c=>{
        const away = c.away || '';
        const home = c.home || '';
        const ft = formatDisplayTime(c.start_time);
        const timeTxt = ft? ` <span class="muted-small">· ${ft}</span>` : '';

        const picks = c.picks || {};
        const ml = picks.ML ? pickLine(picks.ML) : '—';
        const ats = picks.ATS ? pickLine(picks.ATS) : '—';
        const tot = picks.TOTAL ? pickLine(picks.TOTAL) : '—';

        const props = c.props || {};
        const cats = Object.keys(props);
        const propsHtml = cats.length ? cats.map(st=>{
          const rows = Array.isArray(props[st]) ? props[st] : [];
          if(!rows.length) return '';
          const items = rows.map(p=>{
            const price = fmtOddsAmerican(p.price);
            const ev = (p.ev!=null && Number.isFinite(Number(p.ev))) ? fmtSigned1(p.ev) : '';
            const act = (p.actual!=null && Number.isFinite(Number(p.actual))) ? fmtNum(p.actual,1) : '';
            const pred = (p.pred!=null && Number.isFinite(Number(p.pred))) ? fmtNum(p.pred,1) : '';
            const res = p.result ? `<span class="pill">${String(p.result)}</span>` : '';
            const recon = (act||pred) ? ` <span class="muted-small">pred ${pred||'—'} · act ${act||'—'}</span>` : '';
            return `<div class="mt-4"><span class="team-text">${String(p.player||'')}</span> <span class="muted-small">(${String(p.team||'')})</span> — ${propLabel(p)}${price?` <span class="pill">${price}</span>`:''}${ev?` <span class="pill">EV ${ev}</span>`:''}${res}${recon}</div>`;
          }).join('');
          const label = String(st||'').toUpperCase();
          return `<div class="mt-4"><div class="title-sm">Top ${label}</div>${items}</div>`;
        }).join('') : '<div class="muted-small mt-4">No props found for this game.</div>';

        let reconHtml = '';
        try{
          const r = c.recon || {};
          const finals = r.finals || null;
          const q = r.quarters || null;

    function filterPropsByMarkets(rows, mkts){
      try{
        if(!Array.isArray(rows) || !rows.length) return [];
        const set = new Set((mkts||[]).map(s=>String(s||'').toLowerCase()));
        if(set.size===0) return rows;
        const matchComposite = (m)=>{
          const mm = String(m||'').toLowerCase();
          if(set.has(mm)) return true;
          // Composite mappings: include combo markets when components selected
          if(mm==='pa') return (set.has('pts') || set.has('ast'));
          if(mm==='pr') return (set.has('pts') || set.has('reb'));
          if(mm==='ra') return (set.has('reb') || set.has('ast'));
          if(mm==='pra') return (set.has('pra') || set.has('pts') || set.has('reb') || set.has('ast'));
          // normalize 3pt to threes
          if(mm==='3pt') return set.has('threes');
          return false;
        };
        return rows.filter(r=>{
          const plays = parsePlays(r.plays||r.top_play||'');
          const list = Array.isArray(plays)? plays: ((plays && typeof plays==='object')? [plays] : []);
          return list.some(p=> matchComposite(p.market));
        });
      }catch(_){ return rows||[]; }
    }
    async function fetchReconGames(date){
      try{
        const r = await fetch(apiUrl(`/api/processed/recon_games?date=${encodeURIComponent(date)}`), {cache:'no-store'});
        if(!r.ok) return new Map();
        const txt = await r.text();
        const lines = txt.trim().split(/\r?\n/);
        if(lines.length<2) return new Map();
        const hdr = lines[0].split(',');
        const col = (name)=> hdr.indexOf(name);
        const m = new Map();
        for(let i=1;i<lines.length;i++){
          const parts = lines[i].split(',');
          const home = (parts[col('home_team')]||'').trim();
          const away = (parts[col('visitor_team')]||'').trim();
          const hp = parseFloat(parts[col('home_pts')]||'');
          const ap = parseFloat(parts[col('visitor_pts')]||'');
          if(home && away){ m.set(home+'@@'+away, {home,away,hp:isNaN(hp)?null:hp, ap:isNaN(ap)?null:ap}); }
        }
        return m;
      }catch(_){ return new Map(); }
    }
    async function fetchPredictionLines(date){
      try{
        const r = await fetch(apiUrl(`/api/predictions?date=${encodeURIComponent(date)}`), {cache:'no-store'});
        const js = await r.json();
        const rows = Array.isArray(js.rows)? js.rows: [];
        const m = new Map();
        const numOrNull = (v)=>{
          if(v==null) return null;
          const s = String(v).trim();
          if(s==='') return null;
          const n = Number(s);
          return Number.isFinite(n)? n: null;
        };
        rows.forEach(x=>{
          const k = String(x.home_team||'').trim()+'@@'+String(x.visitor_team||'').trim();
          m.set(k, {
            home_spread: numOrNull(x.home_spread),
            total: numOrNull(x.total),
            home_ml: numOrNull(x.home_ml),
            away_ml: numOrNull(x.away_ml),
          });
        });
        return m;
      }catch(_){ return new Map(); }
    }
    function americanToDecimal(a){ if(a==null||isNaN(a)) return null; a=Number(a); if(a>0) return 1+(a/100); if(a<0) return 1+(100/Math.abs(a)); return null; }
    function annotateResults(rows, finals, lines){
      rows.forEach(r=>{
        const key = String(r.home||'').trim()+'@@'+String(r.away||'').trim();
        const f = finals.get(key) || finals.get(String(r.away||'').trim()+'@@'+String(r.home||'').trim());
        const ln = lines.get(key) || lines.get(String(r.away||'').trim()+'@@'+String(r.home||'').trim());
        r.odds = null; r.result = null; r.selectionLabel = '';
        if(r.market==='ML'){
          const pickHome = r.side===r.home;
          let amer = pickHome? (ln?ln.home_ml:null): (ln?ln.away_ml:null);
          if(amer==null){
            const ps = r.price;
            if(ps!=null && String(ps).trim()!==''){
              const v = Number(ps);
              amer = (Number.isFinite(v) && v!==0) ? v : null;
            }
          }
          r.odds = (amer!=null? amer: null);
          r.selectionLabel = `${r.side} ML`;
          if(f && f.hp!=null && f.ap!=null){ const homeWon = f.hp>f.ap; r.result = (pickHome===homeWon)? 'Win':'Loss'; }
        } else if(r.market==='ATS'){
          let hs = ln? ln.home_spread: null;
          if(hs==null){
            // Fallback: use row line; assume line refers to home_team spread
            const ls = r.line;
            if(ls!=null && String(ls).trim()!==''){
              const v = Number(ls);
              hs = Number.isFinite(v) ? v : null;
            }
          }
          if(hs!=null && Number.isFinite(Number(hs))){
            const lineHome = Number(hs);
            const isHome = r.side===r.home;
            const lineDisp = isHome? (lineHome>0?`+${lineHome}`:`${lineHome}`) : ((-lineHome)>0?`+${-lineHome}`:`${-lineHome}`);
            r.selectionLabel = `${r.side} ${lineDisp}`;
          } else { r.selectionLabel = `${r.side}`; }
          // Prefer enriched price from row when available
          if(r.price!=null && String(r.price).trim()!==''){
            const pv = Number(r.price);
            r.odds = (Number.isFinite(pv) && pv!==0)? pv: -110;
          } else {
            r.odds = -110;
          }
          if(f && f.hp!=null && f.ap!=null && hs!=null && Number.isFinite(Number(hs))){
            const margin = f.hp - f.ap;
            const diff = (r.side===r.home)? (margin + Number(hs)) : (-margin - Number(hs));
            r.result = Math.abs(diff)<1e-9? 'Push': (diff>0? 'Win':'Loss');
          }
        } else if(r.market==='TOTAL'){
          let tot = ln? ln.total: null;
          if(tot==null){
            const ls = r.line;
            if(ls!=null && String(ls).trim()!==''){
              const v = Number(ls);
              tot = Number.isFinite(v) ? v : null;
            }
          }
          const side = String(r.side||'').toLowerCase();
          r.selectionLabel = (tot!=null && Number.isFinite(Number(tot)))? `${r.side} ${Number(tot)}`: `${r.side}`;
          // Prefer enriched price from row when available (Over/Under specific)
          if(r.price!=null && String(r.price).trim()!==''){
            const pv = Number(r.price);
            r.odds = (Number.isFinite(pv) && pv!==0)? pv: -110;
          } else {
            r.odds = -110;
          }
          if(f && f.hp!=null && f.ap!=null && tot!=null && Number.isFinite(Number(tot))){
            const pts = f.hp + f.ap;
            const diff = side.startsWith('o')? (pts-Number(tot)) : (Number(tot)-pts);
            r.result = Math.abs(diff)<1e-9? 'Push': (diff>0? 'Win':'Loss');
          }
        }
      });
    }

      try{
        const isoTodayUTC = ()=>{ try{ return new Date().toISOString().slice(0,10); }catch(_){ return ''; } };
        const addDaysUTC = (iso, days)=>{
          try{
            const d = new Date(String(iso).slice(0,10) + 'T00:00:00Z');
            if(Number.isFinite(Number(days))) d.setUTCDate(d.getUTCDate() + Number(days));

        if(!items.length){ root.innerHTML='<div class="card">No recap data available.</div>'; return; }
        root.innerHTML='';
        const fmtMoney = (u)=>{ try{ if(u==null) return '—'; const v=Number(u)*100; if(!Number.isFinite(v)) return '—'; const sign = v>=0? '': '-'; return sign+'$'+Math.abs(v).toFixed(0); }catch(_){ return '—'; } };
        const fmtPct = (x)=>{ try{ if(x==null) return '—'; const v=Number(x); return Number.isFinite(v)? (v.toFixed(1)+'%') : '—'; }catch(_){ return '—'; } };
        const pickBucket = (obj)=>{ try{ return obj && obj.buckets && obj.buckets.Overall ? obj.buckets.Overall : null; }catch(_){ return null; } };
        const esc = (s)=>{ try{ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }catch(_){ return ''; } };
        const fmtOdds = (x)=>{ try{ const n=Number(x); if(!Number.isFinite(n)) return ''; const v=Math.round(n); return v>0?('+'+v):String(v); }catch(_){ return ''; } };

        // "Best edges" selection + tracking
        function bestEdgeValueGame(x){
          try{
            const m = String(x && x.market || '').toUpperCase();
            const ev = Number(x && x.ev!=null ? x.ev : 0);
            const edge = Math.abs(Number(x && x.edge!=null ? x.edge : 0));
            if(m==='ML') return Number.isFinite(ev) ? ev : 0;
            if(m==='ATS' || m==='TOTAL') return Number.isFinite(edge) ? edge : 0;
            // fallback
            if(Number.isFinite(edge) && edge>0) return edge;
            if(Number.isFinite(ev) && ev>0) return ev;

        function bestEdgeValueProp(x){
          try{
            const ev = Number(x && x.ev!=null ? x.ev : 0);
            if(Number.isFinite(ev) && ev!==0) return ev;
            const edge = Math.abs(Number(x && x.edge!=null ? x.edge : 0));
            if(Number.isFinite(edge) && edge!==0) return edge;
            // last resort
            const s = Number(x && x.score!=null ? x.score : 0);
            return Number.isFinite(s) ? s : 0;
          }catch(_){ return 0; }

        function selectBestGameEdges(gpicks){
          try{
            if(!Array.isArray(gpicks) || !gpicks.length) return [];
            // De-dupe: 1 pick per game
            const byGame = new Map();
            gpicks.forEach(r=>{
              const gid = (r && r.game_id!=null && String(r.game_id).trim()!=='')
                ? String(r.game_id)
                : (r && r.matchup ? String(r.matchup) : JSON.stringify([r.away,r.home]));
              const prev = byGame.get(gid);
              const v = bestEdgeValueGame(r);
              const pv = prev ? bestEdgeValueGame(prev) : -1;
              if(!prev || v>pv){ byGame.set(gid, r); }
            });
            const arr = Array.from(byGame.values());
            arr.sort((a,b)=> bestEdgeValueGame(b) - bestEdgeValueGame(a));
            return arr.slice(0, MAX_GAME_PICKS);
          }catch(_){ return Array.isArray(gpicks) ? gpicks.slice(0, MAX_GAME_PICKS) : []; }
        }
        function selectBestPropEdges(ppicks){

            ppicks.forEach(r=>{
              const key = String(r.player||r.player_name||'').trim().toLowerCase() + '@@' + String(r.team||'').trim().toUpperCase();
              const prev = byPlayer.get(key);
              const v = bestEdgeValueProp(r);
              const pv = prev ? bestEdgeValueProp(prev) : -1;
              if(!prev || v>pv){ byPlayer.set(key, r); }
            });
            const arr = Array.from(byPlayer.values());
            arr.sort((a,b)=> bestEdgeValueProp(b) - bestEdgeValueProp(a));
            return arr.slice(0, MAX_PROP_PICKS);
          }catch(_){ return Array.isArray(ppicks) ? ppicks.slice(0, MAX_PROP_PICKS) : []; }
        }
        function summarizeFromPicks(picks){
          try{
            const out = { total: 0, resolved: 0, wins: 0, losses: 0, pushes: 0, stake_total: 0, profit_total: 0, accuracy_pct: null, roi_pct: null };
            if(!Array.isArray(picks)) return out;

            picks.forEach(x=>{
              const res = String(x && x.result || '').trim();
              if(res){
                out.resolved += 1;
                if(res==='Win') out.wins += 1;
                else if(res==='Loss') out.losses += 1;
                else if(res==='Push') out.pushes += 1;
              }
              const stake = (x && x.stake!=null) ? Number(x.stake) : (x && x.stake_units!=null ? Number(x.stake_units) : 0);

              if(Number.isFinite(stake)) out.stake_total += stake;
              if(Number.isFinite(profit)) out.profit_total += profit;

            if(out.resolved>0){ out.accuracy_pct = (out.wins/out.resolved)*100; }

      const wrap=document.createElement('div'); wrap.className='table table-wrap'; const tbl=document.createElement('table'); tbl.innerHTML='<thead><tr><th>Matchup</th><th>Player</th><th>Team</th><th>Prob</th><th>Fair</th><th>Rank</th></tr></thead>'; const tb=document.createElement('tbody'); rows.slice(0,10).forEach(r=>{ const prob = (r.prob_first_basket!=null)? (Number(r.prob_first_basket*100).toFixed(1)+'%') : ''; const fair = (r.fair_american!=null)? ((Number(r.fair_american)>0? '+'+Number(r.fair_american): String(Number(r.fair_american)))): ''; const tr=document.createElement('tr'); const game = (r.matchup && String(r.matchup).trim())? String(r.matchup).trim(): ''; const gidTxt = r.game_id? ` <span class="muted-small">(${String(r.game_id)})</span>`: ''; const ft = formatDisplayTime(r.start_time); const timeTxt = ft? ` <span class="muted-small">· ${ft}</span>`: ''; const teamHtml = r.team? teamBadge(r.team): ''; tr.innerHTML=`<td>${game}${gidTxt}${timeTxt}</td><td>${r.player_name||''}</td><td>${teamHtml}</td><td class="tar">${prob}</td><td class="tar">${fair}</td><td class="tar">${r.rank||''}</td>`; tb.appendChild(tr); }); tbl.appendChild(tb); wrap.appendChild(tbl); root.appendChild(wrap); }
    function renderEarlyThrees(rows){ const root=document.getElementById('thrRoot'); if(!root) return; root.innerHTML=''; if(!rows.length){ root.innerHTML='<div class="card">No early-3s signals.</div>'; return; }
      const sorted = [...rows].sort((a,b)=>{
        const pa = Number(a.prob_ge_1||0), pb = Number(b.prob_ge_1||0);
        if(pb!==pa) return pb-pa; // prob desc
        const ea = Number(a.expected||0), eb = Number(b.expected||0);
        return eb-ea; // expected desc
      });
      const wrap=document.createElement('div'); wrap.className='table table-wrap'; const tbl=document.createElement('table'); tbl.innerHTML='<thead><tr><th>Matchup</th><th>Bet</th><th>Prob ≥1</th><th>Expected</th></tr></thead>'; const tb=document.createElement('tbody'); sorted.forEach(r=>{ const prob = (r.prob_ge_1!=null)? (Number(r.prob_ge_1*100).toFixed(1)+'%') : ''; const exp = (r.expected!=null)? Number(r.expected).toFixed(2) : ''; const tr=document.createElement('tr'); const away = (r.away||r.visitor_team||''); const home = (r.home||r.home_team||''); let base = (r.matchup && String(r.matchup).trim())? String(r.matchup).trim(): `${away} @ ${home}`; if(!base.trim() || base.trim()==='@'){ const gid = r.game_id? String(r.game_id): ''; base = gid? `Game ${gid}`: '—'; } const gidTxt = r.game_id? ` <span class="muted-small">(${String(r.game_id)})</span>`: ''; const ft = formatDisplayTime(r.start_time); const timeTxt = ft? ` <span class="muted-small">· ${ft}</span>`: ''; const matchupHtml = `${away? teamBadge(away): ''} @ ${home? teamBadge(home): ''}`; tr.innerHTML=`<td>${matchupHtml}${gidTxt}${timeTxt}</td><td>${r.side||''}</td><td class="tar">${prob}</td><td class="tar">${exp}</td>`; tb.appendChild(tr); }); tbl.appendChild(tb); wrap.appendChild(tbl); root.appendChild(wrap); }
  window.addEventListener('DOMContentLoaded', ()=>{ const inp=document.getElementById('datePicker'); const qd=qs('date'); inp.value=qd || localYMD(); document.getElementById('resetBtn').addEventListener('click',()=>{ document.getElementById('minSpread').value='1.0'; document.getElementById('minTotal').value='1.5'; document.getElementById('sortBy').value='confidence'; loadRecs(); }); const psb=document.getElementById('propsSortApply'); if(psb){ psb.addEventListener('click',()=>{ if(window.__lastProps){ renderProps(window.__lastProps); } }); } const psel=document.getElementById('propsSortBy'); if(psel){ psel.addEventListener('change',()=>{ if(window.__lastProps){ renderProps(window.__lastProps); } }); } const reg=document.getElementById('propsRegularOnly'); if(reg){ reg.addEventListener('change',()=>{ loadRecs(); }); } loadRecs(); });
  </script>
