<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NBA Player Props</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://a.espncdn.com">
  <link rel="dns-prefetch" href="https://a.espncdn.com">
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta name="color-scheme" content="dark light" />
  <style>
    :root{ --bg:#080d1a; --text:#f5f7ff; --muted:#c3cee4; --link:#b8d1ff; --input-bg:#121b31; --input-br:#243356; --button-bg:#1b2339; --button-br:#2a3a63; --button-text:#e6edf7; --row1:#0f1629; --row2:#121b31; --th:#0f1629; --table-br:#243356; }
    body.light{ --bg:#ffffff; --text:#0a0f1c; --muted:#475569; --link:#1e40af; --input-bg:#ffffff; --input-br:#94a3b8; --button-bg:#f1f5f9; --button-br:#94a3b8; --button-text:#0a0f1c; --row1:#f8fafc; --row2:#eef2f7; --th:#e2e8f0; --table-br:#cbd5e1; }
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; margin:0; background:var(--bg); color:var(--text); }
    .container{ max-width: 1200px; margin: 32px auto; padding: 0 16px; }
    h1{ font-size: 22px; margin: 0 0 16px; }
    .nav{ font-size: 14px; margin-bottom: 10px; }
    .nav a { color: var(--link); text-decoration: none; margin-right: 10px; }
    .nav button.theme-toggle{ background: var(--button-bg); color: var(--button-text); border: 1px solid var(--button-br); border-radius: 6px; padding: 6px 10px; cursor: pointer; }
    .meta{ color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .filters{ display: flex; gap: 8px; align-items: center; margin: 12px 0 16px; flex-wrap: wrap; }
    .filters input, .filters select { background: var(--input-bg); border: 1px solid var(--input-br); color: var(--text); padding: 6px 8px; border-radius: 6px; }
    .filters button, .filters a.btn { background: var(--button-bg); color: var(--button-text); border: 1px solid var(--button-br); border-radius: 6px; padding: 6px 10px; cursor:pointer; text-decoration:none; }
    table{ width:100%; border-collapse:collapse; font-size: 13px; }
    th,td{ border:1px solid var(--table-br); padding:6px 8px; text-align:left; }
    th{ background:var(--th); position:sticky; top:0; }
    tr:nth-child(odd) td{ background:var(--row1); }
    tr:nth-child(even) td{ background:var(--row2); }
    .scroll-table{ overflow:auto; max-height:70vh; border:1px solid var(--table-br); border-radius:8px; }
    @media (max-width: 760px){ .container{ padding: 0 10px; margin: 12px auto; } h1{ font-size: 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav"><a href="/">Cards</a> | <a href="/recommendations">Recommendations</a> | <a href="/props" aria-current="page">Props</a> | <a href="/props/recommendations">Props Recs</a> | <a href="/reconciliation">Reconciliation</a> | <button type="button" class="theme-toggle" id="themeToggle" title="Toggle light/dark">Toggle Theme</button></div>
    <h1>NBA Player Props</h1>
    <div class="meta" id="meta">Loading...</div>
    <div class="filters">
      <label>Date <input id="datePicker" type="date" /></label>
      <label>Market
        <select id="market">
          <option value="">All</option>
          <option value="pts">PTS</option>
          <option value="reb">REB</option>
          <option value="ast">AST</option>
          <option value="threes">3PM</option>
          <option value="pra">PRA</option>
        </select>
      </label>
      <label>Team <input id="team" type="text" placeholder="e.g. BOS" style="width:80px" /></label>
      <label>Mode
        <select id="mode">
          <option value="edges">Edges</option>
          <option value="predictions">Predictions</option>
        </select>
      </label>
      <label title="Show only best line per player-stat"><input type="checkbox" id="collapse" checked> Collapse</label>
      <label title="Run build/refresh for this date"><input type="checkbox" id="build"> Build</label>
      <label>Min Edge <input id="minEdge" type="number" step="1" value="0" style="width:60px"></label>
      <label>Min EV <input id="minEV" type="number" step="0.1" value="0" style="width:60px"></label>
      <label>Sort
        <select id="sortBy">
          <option value="">Default</option>
          <option value="pred_desc">Pred ↓</option>
          <option value="pred_asc">Pred ↑</option>
        </select>
      </label>
      <button type="button" id="applyBtn">Apply</button>
      <button type="button" id="resetBtn">Reset</button>
      <a class="btn" href="#" id="downloadCsv" download>Download CSV</a>
    </div>
    <div class="scroll-table">
      <table id="tbl">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <script>
    // Theme toggle
    (function(){ try{ var body=document.body; var saved=localStorage.getItem('theme'); if(saved==='light'){ body.classList.add('light'); } var tbtn=document.getElementById('themeToggle'); if(tbtn){ tbtn.addEventListener('click', function(){ body.classList.toggle('light'); localStorage.setItem('theme', body.classList.contains('light')?'light':'dark'); }); } }catch(e){} })();
    
    function localYMD(){ const d=new Date(); return d.toISOString().slice(0,10); }
    
    async function fetchProps(){
      const d = document.getElementById('datePicker').value || localYMD();
      const market = document.getElementById('market').value;
      const team = document.getElementById('team').value;
      const mode = document.getElementById('mode').value;
      const build = document.getElementById('build').checked ? '1' : '0';
      const collapse = document.getElementById('collapse').checked ? '1' : '0';
      const minEdge = document.getElementById('minEdge').value;
      const minEV = document.getElementById('minEV').value;
      const sortBy = document.getElementById('sortBy').value;
      const qp = new URLSearchParams({ date: d, market, team, source: mode, build, collapse, min_edge: minEdge, min_ev: minEV });
      if (sortBy) qp.set('sortBy', sortBy);
      
      document.getElementById('meta').textContent = 'Loading...';
      const res = await fetch(`/api/props?${qp.toString()}`, {cache:'no-store'});
      const js = await res.json();
      const tbody = document.querySelector('#tbl tbody');
      tbody.innerHTML='';
      const rows = js.rows || [];
      const src = js.source || mode;
      
      // Configure table header for mode
      const thead = document.querySelector('#tbl thead');
      if (src === 'predictions') {
        thead.innerHTML = '<tr><th>Team</th><th>Player</th><th>Opp</th><th>H/A</th><th>Stat</th><th>Pred</th></tr>';
        for (const r of rows){
          const tr = document.createElement('tr');
          const ha = r.home===true? 'H' : (r.home===false? 'A' : '');
          tr.innerHTML = `<td>${r.team||''}</td><td>${r.player_name||''}</td><td>${r.opponent||''}</td><td>${ha}</td><td>${(r.stat||'').toUpperCase()}</td><td>${r.pred!=null? Number(r.pred).toFixed(2):''}</td>`;
          tbody.appendChild(tr);
        }
      } else {
        thead.innerHTML = '<tr><th>Team</th><th>Player</th><th>Stat</th><th>Side</th><th>Line</th><th>Price</th><th>Edge</th><th>EV</th><th>Book</th></tr>';
        for (const r of rows){
          const tr = document.createElement('tr');
          const ev = r.ev!=null? Number(r.ev).toFixed(2) : '';
          const edge = r.edge!=null? (Number(r.edge)*100).toFixed(1)+'%' : '';
          tr.innerHTML = `<td>${r.team||''}</td><td>${r.player_name||''}</td><td>${(r.stat||'').toUpperCase()}</td><td>${r.side||''}</td><td>${r.line||''}</td><td>${r.price||''}</td><td>${edge}</td><td>${ev}</td><td>${r.bookmaker||''}</td>`;
          tbody.appendChild(tr);
        }
      }
      
      const collapsed = js.collapsed ? 'best-of-book' : 'all books';
      const srcLabel = src==='predictions' ? 'predictions' : `edges (${collapsed})`;
      const sortLabel = (src==='predictions' && sortBy)? ` • sort=${sortBy}` : '';
      const teamLabel = team? ` • team ${team}`: '';
      document.getElementById('meta').textContent = `Date ${js.date||d} — ${rows.length} rows • ${srcLabel}${market? ' • '+market.toUpperCase():''}${teamLabel}${sortLabel}`;
      
      // Update CSV link
      document.getElementById('downloadCsv').href = `/props_predictions_${d}.csv`;
    }
    
    window.addEventListener('DOMContentLoaded', ()=>{
      const params = new URLSearchParams(window.location.search);
      const paramDate = params.get('date');
      const inp = document.getElementById('datePicker');
      inp.value = paramDate || localYMD();
      
      document.getElementById('applyBtn').addEventListener('click', fetchProps);
      document.getElementById('resetBtn').addEventListener('click', ()=>{
        document.getElementById('market').value='';
        document.getElementById('team').value='';
        document.getElementById('mode').value='edges';
        document.getElementById('collapse').checked=true;
        document.getElementById('build').checked=false;
        document.getElementById('minEdge').value='0';
        document.getElementById('minEV').value='0';
        document.getElementById('sortBy').value='';
        fetchProps();
      });
      
      fetchProps();
    });
  </script>
</body>
</html>
