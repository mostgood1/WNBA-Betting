<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NBA - Best Bets & Parlays</title>
  <meta name="description" content="Basketball-first NBA best bets and parlays for games." />
  <style>
    :root{--bg:#07111f;--panel:#0d1a30;--panel2:#13233f;--text:#f4f7ff;--muted:#aab9d6;--border:#294264;--pill:#11203a;--pillBorder:#38527a;--accent:#9fd0ff;--good:#9ee6b3;--warn:#f7d470;--bad:#f1a4a4}
    body{margin:0;background:radial-gradient(circle at top,#183153 0%,#07111f 55%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .container{max-width:1180px;margin:24px auto;padding:0 16px 32px}
    .nav{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
    .nav a,.nav button,.controls button{background:var(--pill);border:1px solid var(--pillBorder);border-radius:999px;color:var(--text);padding:8px 12px;text-decoration:none;font-size:13px;cursor:pointer}
    .nav a.active{border-color:var(--accent);color:var(--accent)}
    .header{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
    h1{margin:0;font-size:30px}
    .sub{color:var(--muted);max-width:760px;line-height:1.5}
    .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:end;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:16px;box-shadow:0 16px 40px rgba(0,0,0,.28)}
    .controls label{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted)}
    .controls input,.controls select{background:#0a1528;color:var(--text);border:1px solid var(--border);border-radius:12px;padding:10px 12px;min-width:92px}
    .controls .wide{min-width:180px}
    .status{margin-bottom:14px;color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .stack{display:grid;gap:16px}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:0 16px 40px rgba(0,0,0,.28)}
    .card h2{margin:0 0 12px;font-size:20px}
    .meta{color:var(--muted);font-size:13px}
    .pickLine{font-size:22px;font-weight:700;margin:6px 0}
    .matchup{color:var(--muted);font-size:14px}
    .summary{margin-top:10px;line-height:1.55}
    .reasonCopy{margin-top:10px;color:var(--muted);font-size:13px;line-height:1.5}
    .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .pill{display:inline-flex;align-items:center;gap:6px;background:var(--pill);border:1px solid var(--pillBorder);border-radius:999px;padding:6px 10px;font-size:12px}
    .pill.main{border-color:var(--accent);color:var(--accent)}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:14px}
    .metric{background:rgba(7,17,31,.45);border:1px solid var(--border);border-radius:14px;padding:10px}
    .metric .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .metric .value{font-size:18px;font-weight:700;margin-top:4px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-top:1px solid rgba(41,66,100,.65);text-align:left;vertical-align:top}
    thead th{border-top:none;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
    td.right,th.right{text-align:right}
    .code{font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid var(--pillBorder);background:var(--pill);display:inline-block}
    .parlay{border:1px solid var(--border);border-radius:16px;padding:14px;background:rgba(7,17,31,.35)}
    .parlay+.parlay{margin-top:12px}
    .parlayGrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:12px}
    .legs{display:grid;gap:10px}
    .leg{border:1px solid var(--border);border-radius:14px;padding:12px;background:rgba(10,21,40,.55)}
    .empty{color:var(--muted);padding:10px 0}
    @media (max-width: 960px){.grid{grid-template-columns:1fr}.metrics,.parlayGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width: 640px){.container{padding:0 12px 24px}.controls{padding:12px}.controls label,.controls input,.controls select{width:100%}.metrics,.parlayGrid{grid-template-columns:1fr}h1{font-size:24px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/">Cards</a>
      <a href="/recommendations">Recommendations</a>
      <a href="/best-bets-parlays" class="active">Best Bets</a>
      <a href="/props/recommendations">Props Recs</a>
      <a href="/props/best-bets-parlays">Props Parlays</a>
      <a id="jsonLink" href="#">JSON</a>
    </div>

    <div class="header">
      <div>
        <h1>NBA - Best Bets & Parlays</h1>
        <div class="sub">Ranked the same way you asked for it: basketball matchup reasons first, then simulation support, then price and market edge.</div>
      </div>
      <div class="meta" id="asOf"></div>
    </div>

    <form class="controls" id="controls">
      <label>Date
        <input type="date" id="date" />
      </label>
      <label>Markets
        <input class="wide" type="text" id="markets" value="ATS,ML,OU" />
      </label>
      <label>Best Bets
        <input type="number" id="bestBets" min="1" max="25" value="5" />
      </label>
      <label>Candidate Pool
        <input type="number" id="candidatePool" min="2" max="20" value="8" />
      </label>
      <label>Parlay Size
        <input type="number" id="parlaySize" min="2" max="6" value="2" />
      </label>
      <label>Max Parlays
        <input type="number" id="maxParlays" min="1" max="20" value="3" />
      </label>
      <label>Future Only
        <select id="futureOnly">
          <option value="0">All Games</option>
          <option value="1">Future Only</option>
        </select>
      </label>
      <label>Min Score
        <input type="number" id="minScore" min="0" max="100" step="1" value="0" />
      </label>
      <button type="submit">Refresh</button>
    </form>

    <div class="status" id="status">Loading...</div>

    <div class="grid">
      <div class="stack">
        <section class="card" id="bestCard">
          <h2>Best Play Overall</h2>
          <div class="empty">Loading...</div>
        </section>

        <section class="card">
          <h2>Best Bets</h2>
          <div id="bestBetsTable"></div>
        </section>
      </div>

      <div class="stack">
        <section class="card">
          <h2>Parlays</h2>
          <div id="parlays"></div>
        </section>

        <section class="card">
          <h2>Source Summary</h2>
          <div class="pills" id="sourceSummary"></div>
        </section>
      </div>
    </div>
  </div>

  <script>
    function localDateString(){
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }
    function esc(value){
      return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch] || ch;
      });
    }
    function fmtNum(value, digits){
      const n = Number(value);
      if(!Number.isFinite(n)) return '-';
      return n.toFixed(digits);
    }
    function fmtPrice(value){
      const n = Number(value);
      if(!Number.isFinite(n)) return '-';
      return n > 0 ? `+${Math.round(n)}` : `${Math.round(n)}`;
    }
    function priorityPills(row){
      return `
        <div class="pills">
          <span class="pill main">Overall ${fmtNum(row.recommendation_priority_score, 0)}</span>
          <span class="pill">B ${fmtNum(row.basketball_priority_score, 0)}</span>
          <span class="pill">S ${fmtNum(row.sim_support_score, 0)}</span>
          <span class="pill">V ${fmtNum(row.value_support_score, 0)}</span>
        </div>`;
    }
    function reasonList(row){
      const model = Array.isArray(row.model_reasons) ? row.model_reasons : [];
      return model.length ? `<div class="reasonCopy">${model.map(esc).join(', ')}</div>` : '';
    }
    function currentParams(){
      const params = new URLSearchParams();
      params.set('date', document.getElementById('date').value || localDateString());
      params.set('markets', document.getElementById('markets').value || 'ATS,ML,OU');
      params.set('best_bets', document.getElementById('bestBets').value || '5');
      params.set('candidate_pool', document.getElementById('candidatePool').value || '8');
      params.set('parlay_size', document.getElementById('parlaySize').value || '2');
      params.set('max_parlays', document.getElementById('maxParlays').value || '3');
      params.set('future_only', document.getElementById('futureOnly').value || '0');
      params.set('min_score', document.getElementById('minScore').value || '0');
      return params;
    }
    function applyUrlState(){
      const url = new URL(window.location.href);
      document.getElementById('date').value = url.searchParams.get('date') || localDateString();
      document.getElementById('markets').value = url.searchParams.get('markets') || 'ATS,ML,OU';
      document.getElementById('bestBets').value = url.searchParams.get('best_bets') || '5';
      document.getElementById('candidatePool').value = url.searchParams.get('candidate_pool') || '8';
      document.getElementById('parlaySize').value = url.searchParams.get('parlay_size') || '2';
      document.getElementById('maxParlays').value = url.searchParams.get('max_parlays') || '3';
      document.getElementById('futureOnly').value = url.searchParams.get('future_only') || '0';
      document.getElementById('minScore').value = url.searchParams.get('min_score') || '0';
    }
    function syncUrl(params){
      const url = new URL(window.location.href);
      url.search = params.toString();
      history.replaceState(null, '', url.toString());
      document.getElementById('jsonLink').href = `/api/best-bets-parlays?${params.toString()}`;
    }
    function renderBestCard(row){
      const root = document.getElementById('bestCard');
      if(!row){
        root.innerHTML = '<h2>Best Play Overall</h2><div class="empty">No qualifying best bet for this request.</div>';
        return;
      }
      root.innerHTML = `
        <h2>Best Play Overall</h2>
        <div class="code">${esc(row.rec_code || '')}</div>
        <div class="pickLine">${esc(row.display_pick || '')}</div>
        <div class="matchup">${esc(row.matchup || '')}${row.start_time_local ? ` | ${esc(row.start_time_local)}` : ''}</div>
        ${row.basketball_summary ? `<div class="summary">${esc(row.basketball_summary)}</div>` : ''}
        ${priorityPills(row)}
        <div class="metrics">
          <div class="metric"><div class="label">Price</div><div class="value">${fmtPrice(row.price)}</div></div>
          <div class="metric"><div class="label">P(win)</div><div class="value">${fmtNum(row.p_win, 3)}</div></div>
          <div class="metric"><div class="label">Score</div><div class="value">${fmtNum(row.score, 1)}</div></div>
          <div class="metric"><div class="label">Line</div><div class="value">${row.line == null ? '-' : fmtNum(row.line, 1)}</div></div>
        </div>
        ${reasonList(row)}`;
    }
    function renderBestBets(rows){
      const root = document.getElementById('bestBetsTable');
      if(!Array.isArray(rows) || !rows.length){
        root.innerHTML = '<div class="empty">No qualifying bets found.</div>';
        return;
      }
      root.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Type</th>
              <th>Pick</th>
              <th class="right">Price</th>
              <th class="right">P(win)</th>
              <th class="right">Score</th>
              <th>Priority</th>
              <th>Reasons</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row, index)=>`
              <tr>
                <td>${index + 1}</td>
                <td><span class="code">${esc(row.rec_code || '')}</span></td>
                <td><strong>${esc(row.display_pick || '')}</strong><div class="meta">${esc(row.matchup || '')}</div></td>
                <td class="right">${fmtPrice(row.price)}</td>
                <td class="right">${fmtNum(row.p_win, 3)}</td>
                <td class="right">${fmtNum(row.score, 1)}</td>
                <td>${priorityPills(row)}</td>
                <td>${row.basketball_summary ? `<div>${esc(row.basketball_summary)}</div>` : ''}${reasonList(row)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }
    function renderParlays(rows){
      const root = document.getElementById('parlays');
      if(!Array.isArray(rows) || !rows.length){
        root.innerHTML = '<div class="empty">Not enough qualifying games to build a parlay for this request.</div>';
        return;
      }
      root.innerHTML = rows.map((parlay, index)=>`
        <div class="parlay">
          <div class="meta">Parlay ${index + 1}</div>
          <div class="parlayGrid">
            <div class="metric"><div class="label">Combined P(win)</div><div class="value">${fmtNum(parlay.combined_p_win, 3)}</div></div>
            <div class="metric"><div class="label">Approx Odds</div><div class="value">${parlay.approx_american_odds == null ? '-' : fmtPrice(parlay.approx_american_odds)}</div></div>
            <div class="metric"><div class="label">EV / 1 Risk</div><div class="value">${fmtNum(parlay.expected_units_per_1_risk, 2)}</div></div>
            <div class="metric"><div class="label">Priority</div><div class="value">${fmtNum(parlay.avg_recommendation_priority, 1)}</div></div>
            <div class="metric"><div class="label">Min Leg Score</div><div class="value">${fmtNum(parlay.min_leg_score, 1)}</div></div>
          </div>
          <div class="legs">
            ${(parlay.legs || []).map((leg)=>`
              <div class="leg">
                <div><span class="code">${esc(leg.rec_code || '')}</span> <strong>${esc(leg.display_pick || '')}</strong></div>
                <div class="matchup">${esc(leg.matchup || '')}${leg.start_time_local ? ` | ${esc(leg.start_time_local)}` : ''}</div>
                ${leg.basketball_summary ? `<div class="summary">${esc(leg.basketball_summary)}</div>` : ''}
                ${priorityPills(leg)}
                ${reasonList(leg)}
              </div>`).join('')}
          </div>
        </div>`).join('');
    }
    function renderSourceSummary(rows){
      const root = document.getElementById('sourceSummary');
      const items = Array.isArray(rows) ? rows : [];
      root.innerHTML = items.length ? items.map((row)=>`<span class="pill">${esc(row.market)}: ${esc(row.count)} ${esc(row.status)}</span>`).join('') : '<span class="meta">No source summary available.</span>';
    }
    async function load(){
      const params = currentParams();
      syncUrl(params);
      document.getElementById('status').textContent = 'Loading best bets...';
      try{
        const resp = await fetch(`/api/best-bets-parlays?${params.toString()}`);
        const payload = await resp.json();
        if(!resp.ok || payload.status === 'error'){
          renderBestCard(null);
          renderBestBets([]);
          renderParlays([]);
          renderSourceSummary(payload.source_summary || []);
          document.getElementById('status').textContent = payload.message || 'Unable to load best bets.';
          document.getElementById('asOf').textContent = payload.as_of_local ? `Local as-of ${payload.as_of_local}` : '';
          return;
        }
        renderBestCard(payload.best_bet || null);
        renderBestBets(payload.best_bets || []);
        renderParlays(payload.parlays || []);
        renderSourceSummary(payload.source_summary || []);
        document.getElementById('status').textContent = `${payload.candidate_count || 0} qualifying candidates`; 
        document.getElementById('asOf').textContent = payload.as_of_local ? `Local as-of ${payload.as_of_local}` : '';
      }catch(err){
        renderBestCard(null);
        renderBestBets([]);
        renderParlays([]);
        renderSourceSummary([]);
        document.getElementById('status').textContent = `Request failed: ${err}`;
      }
    }
    applyUrlState();
    document.getElementById('controls').addEventListener('submit', function(ev){ ev.preventDefault(); load(); });
    load();
  </script>
</body>
</html>
