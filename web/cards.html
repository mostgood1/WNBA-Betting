<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WNBA Game Cards</title>
  <link rel="stylesheet" href="/web/styles.css?v=20260324-1" />
  <link rel="stylesheet" href="/web/cards-parity.css?v=20260427-unified-live-v11" />
</head>
<body data-cards-base-path="/" class="cards-body cards-app-shell">
  <div class="site-chrome">
    <main class="site-main">
      <div class="cards-shell cards-page-shell">
        <header class="cards-header">
          <div class="cards-title-row">
            <h1>WNBA Game Cards</h1>
            <div class="cards-header-meta" id="cardsHeaderMeta">Loading slate...</div>
          </div>
        </header>

        <section class="cards-control-card" aria-label="Slate controls">
          <form id="controls" class="cards-date-form" onsubmit="return false;">
            <a class="cards-nav-pill" id="cardsPrevDateLink" href="/" rel="prev">Prev</a>
            <span class="cards-nav-pill cards-form-pill" aria-hidden="true">Date</span>
            <input type="date" id="datePicker" aria-label="Select slate date" title="Select slate date" />
            <button type="button" id="applyBtn">Load</button>
            <a class="cards-nav-pill" id="cardsNextDateLink" href="/" rel="next">Next</a>
            <a class="cards-nav-pill" id="cardsSeasonBettingCardLink" href="/season/2026/betting-card?profile=retuned">Betting Card</a>
            <a class="cards-nav-pill" href="/prop-ladders">Prop Ladders</a>
            <a class="cards-nav-pill" href="/live-player-props-audit">Live Prop Audit</a>
          </form>

          <div class="cards-toolbar-rail">
            <div class="cards-source-meta" id="cardsSourceMeta">Loading slate...</div>
            <div class="cards-filters" id="cardsFilters" aria-label="Slate filters"></div>
          </div>
        </section>

        <div id="note" class="alert hidden"></div>

        <section class="cards-scoreboard" id="cardsScoreboard" aria-label="Games">
          <div class="cards-loading-strip">Loading scoreboard...</div>
        </section>

        <main class="cards-grid" id="cardsGrid" aria-live="polite">
          <div class="cards-loading-state">Loading cards...</div>
        </main>
      </div>
    </main>
  </div>

  <script src="/web/cards-parity.js?v=20260510-live-prop-odds-v16"></script>
</body>
</html>
