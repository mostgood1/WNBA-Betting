name: Live Lens Tick

on:
  workflow_dispatch: {}
  schedule:
    # GitHub cron minimum granularity is 5 minutes.
    # This keeps Render's persistent disk populated with live_lens_signals_*.jsonl
    - cron: "*/5 * * * *"

concurrency:
  group: nbabetting-live-lens-tick
  cancel-in-progress: true

env:
  NBA_BETTING_BASE_URL: ${{ secrets.RENDER_URL || secrets.NBA_BETTING_BASE_URL || 'https://nba-betting-5qgf.onrender.com' }}
  NBA_BETTING_CRON_TOKEN: ${{ secrets.CRON_TOKEN || secrets.NBA_BETTING_CRON_TOKEN }}

jobs:
  live-lens-tick:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/live-lens-tick
        run: |
          set -euo pipefail

          test -n "${NBA_BETTING_BASE_URL}" || (echo 'Missing NBA_BETTING_BASE_URL' && exit 1)
          test -n "${NBA_BETTING_CRON_TOKEN}" || (echo 'Missing NBA_BETTING_CRON_TOKEN (set CRON_TOKEN or NBA_BETTING_CRON_TOKEN secret)' && exit 1)

          # No date param: server uses its US cutoff logic to choose the correct slate date.
          URL="${NBA_BETTING_BASE_URL%/}/api/cron/live-lens-tick?ttl=15&min_interval_sec=60&max_props_per_game=8&recent_window_sec=180&first_bet_only=1"
          echo "GET $URL"

          for i in 1 2 3 4 5 6; do
            set +e
            http=$(curl -sS -o resp.txt -w "%{http_code}" -H "Authorization: Bearer ${NBA_BETTING_CRON_TOKEN}" "$URL")
            rc=$?
            set -e

            if [ "$rc" -ne 0 ]; then http="000"; fi
            cat resp.txt || true

            if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
              exit 0
            fi

            echo "Request attempt $i -> HTTP $http" >&2
            if [ "$http" = "000" ] || [ "$http" -ge 500 ] || [ "$http" = "429" ]; then
              sleep $((i * 5))
              continue
            fi
            exit 1
          done
          exit 1
