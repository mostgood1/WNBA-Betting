name: "WNBA Betting: Daily Update (7AM Central)"

on:
  workflow_dispatch: {}
  schedule:
    # GitHub cron is UTC and does not support timezones.
    # 7:00 AM US Central is 12:00 UTC during CDT and 13:00 UTC during CST.
    # We schedule both and gate at runtime using Windows' Central time conversion.
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"

permissions:
  contents: write

concurrency:
  group: wnbabetting-daily-update
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Decide whether to run (7AM Central)
        id: decide
        shell: powershell
        run: |
          $event = "${{ github.event_name }}"
          $scheduledCron = "${{ github.event.schedule }}"
          $utcNow = [DateTimeOffset]::UtcNow
          $centralTz = [System.TimeZoneInfo]::FindSystemTimeZoneById('Central Standard Time')
          $centralNow = [System.TimeZoneInfo]::ConvertTime($utcNow, $centralTz)

          $date = $centralNow.ToString('yyyy-MM-dd')
          $run = 'true'
          $expectedCron = ''
          if ($event -eq 'schedule') {
            $expectedCron = if ($centralNow.Offset.TotalHours -eq -5) { '0 12 * * *' } else { '0 13 * * *' }
            $run = if ($scheduledCron -eq $expectedCron) { 'true' } else { 'false' }
          }

          Write-Host "event=$event"
          Write-Host "scheduled_cron=$scheduledCron"
          Write-Host "utc_now=$utcNow"
          Write-Host "central_now=$centralNow"
          Write-Host "expected_cron=$expectedCron"
          Write-Host "run=$run date=$date"

          "run=$run" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "date=$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Stop early (not 7AM Central)
        if: steps.decide.outputs.run != 'true'
        shell: powershell
        run: |
          Write-Host "Skipping run: this schedule tick does not match today's 7AM Central trigger."

      - name: Checkout
        if: steps.decide.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        if: steps.decide.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Create venv + install deps
        if: steps.decide.outputs.run == 'true'
        shell: powershell
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Configure git identity
        if: steps.decide.outputs.run == 'true'
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run daily update (Central date)
        if: steps.decide.outputs.run == 'true'
        shell: powershell
        env:
          GIT_TERMINAL_PROMPT: "0"
          # Optional: OddsAPI for odds/props edges. If unset, pipeline should fall back where supported.
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY || secrets.THE_ODDS_API_KEY }}
          DAILY_SKIP_HISTORICAL_MAINTENANCE: "1"
          DAILY_SMARTSIM_NSIMS: "500"
          DAILY_FORCE_SMARTSIM_DATE: "1"
          DAILY_SMARTSIM_OVERWRITE: "1"
          DAILY_BUILD_LEAGUE_STATUS_TIMEOUT_SEC: "900"
          DAILY_REQUIRE_PROPS_LINES: "1"
          DAILY_SKIP_YESTERDAY_ROSTER_AUDIT: "1"
        run: |
          $date = "${{ steps.decide.outputs.date }}"
          if (-not $date) { throw "Missing computed date" }
          Write-Host "Running scripts/daily_update.ps1 for date=$date"
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\daily_update.ps1 -Date $date -GitPush -GitSyncFirst

      - name: Upload live-lens tuning override to Render
        id: upload_live_lens_tuning
        if: steps.decide.outputs.run == 'true'
        shell: powershell
        env:
          WNBA_BETTING_BASE_URL: ${{ secrets.WNBA_BETTING_BASE_URL || secrets.RENDER_URL }}
          LIVE_LENS_ADMIN_TOKEN: ${{ secrets.WNBA_BETTING_ADMIN_TOKEN || secrets.ADMIN_TOKEN }}
        run: |
          function Set-UploadOutput([string]$status, [string]$detail = '') {
            "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            if ($detail) {
              "detail=$detail" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            }
          }

          $baseUrl = "${env:WNBA_BETTING_BASE_URL}".Trim()
          $adminToken = "${env:LIVE_LENS_ADMIN_TOKEN}".Trim()
          $overridePath = Join-Path $PWD 'data\processed\live_lens_tuning_override.json'

          if (-not (Test-Path $overridePath)) {
            Write-Host 'Skipping upload: no live_lens_tuning_override.json produced.'
            Set-UploadOutput 'skipped_no_file' 'live_lens_tuning_override.json not produced'
            exit 0
          }
          if (-not $baseUrl) {
            Write-Host 'Skipping upload: WNBA_BETTING_BASE_URL secret not configured.'
            Set-UploadOutput 'skipped_missing_base_url' 'WNBA_BETTING_BASE_URL secret not configured'
            exit 0
          }
          if (-not $adminToken) {
            Write-Host 'Skipping upload: LIVE_LENS_ADMIN_TOKEN secret not configured.'
            Set-UploadOutput 'skipped_missing_admin_token' 'LIVE_LENS_ADMIN_TOKEN secret not configured'
            exit 0
          }

          $uri = "{0}/api/upload_live_lens_tuning" -f $baseUrl.TrimEnd('/')
          Write-Host "Uploading $overridePath to $uri"
          $respPath = Join-Path $env:RUNNER_TEMP 'live_lens_tuning_upload.json'
          curl.exe --fail-with-body -sS -X POST -H "Authorization: Bearer $adminToken" -F "file=@$overridePath;type=application/json" $uri -o $respPath
          $response = Get-Content $respPath -Raw | ConvertFrom-Json
          if (-not $response.ok) {
            throw "Live-lens tuning upload returned ok=false: $(Get-Content $respPath -Raw)"
          }
          Set-UploadOutput 'uploaded' ([string]$response.path)

      - name: Upload live-lens optimized adjustments to Render
        id: upload_live_lens_optimized
        if: steps.decide.outputs.run == 'true'
        shell: powershell
        env:
          WNBA_BETTING_BASE_URL: ${{ secrets.WNBA_BETTING_BASE_URL || secrets.RENDER_URL }}
          LIVE_LENS_ADMIN_TOKEN: ${{ secrets.WNBA_BETTING_ADMIN_TOKEN || secrets.ADMIN_TOKEN }}
        run: |
          function Set-UploadOutput([string]$status, [string]$detail = '') {
            "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            if ($detail) {
              "detail=$detail" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            }
          }

          $baseUrl = "${env:WNBA_BETTING_BASE_URL}".Trim()
          $adminToken = "${env:LIVE_LENS_ADMIN_TOKEN}".Trim()
          $latestOptimized = Get-ChildItem (Join-Path $PWD 'data\processed') -Filter 'live_lens_adjustments_optimized_*.json' -ErrorAction SilentlyContinue |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if (-not $latestOptimized) {
            Write-Host 'Skipping upload: no live_lens_adjustments_optimized_*.json produced.'
            Set-UploadOutput 'skipped_no_file' 'live_lens_adjustments_optimized_*.json not produced'
            exit 0
          }
          if (-not $baseUrl) {
            Write-Host 'Skipping upload: WNBA_BETTING_BASE_URL secret not configured.'
            Set-UploadOutput 'skipped_missing_base_url' 'WNBA_BETTING_BASE_URL secret not configured'
            exit 0
          }
          if (-not $adminToken) {
            Write-Host 'Skipping upload: LIVE_LENS_ADMIN_TOKEN secret not configured.'
            Set-UploadOutput 'skipped_missing_admin_token' 'LIVE_LENS_ADMIN_TOKEN secret not configured'
            exit 0
          }

          $uri = "{0}/api/upload_live_lens_adjustments_optimized" -f $baseUrl.TrimEnd('/')
          Write-Host "Uploading $($latestOptimized.FullName) to $uri"
          $respPath = Join-Path $env:RUNNER_TEMP 'live_lens_adjustments_upload.json'
          curl.exe --fail-with-body -sS -X POST -H "Authorization: Bearer $adminToken" -F "file=@$($latestOptimized.FullName);type=application/json" $uri -o $respPath
          $response = Get-Content $respPath -Raw | ConvertFrom-Json
          if (-not $response.ok) {
            throw "Live-lens optimized upload returned ok=false: $(Get-Content $respPath -Raw)"
          }
          Set-UploadOutput 'uploaded' ([string]$response.file)

      - name: Summarize live-lens upload status
        if: always() && steps.decide.outputs.run == 'true'
        shell: powershell
        run: |
          $tuningStatus = "${{ steps.upload_live_lens_tuning.outputs.status }}".Trim()
          $tuningDetail = "${{ steps.upload_live_lens_tuning.outputs.detail }}".Trim()
          $optimizedStatus = "${{ steps.upload_live_lens_optimized.outputs.status }}".Trim()
          $optimizedDetail = "${{ steps.upload_live_lens_optimized.outputs.detail }}".Trim()

          Add-Content $env:GITHUB_STEP_SUMMARY "## Live Lens upload status"
          Add-Content $env:GITHUB_STEP_SUMMARY "- tuning override: $tuningStatus $tuningDetail"
          Add-Content $env:GITHUB_STEP_SUMMARY "- optimized adjustments: $optimizedStatus $optimizedDetail"

          foreach ($entry in @(
            @{ Name = 'tuning override'; Status = $tuningStatus; Detail = $tuningDetail },
            @{ Name = 'optimized adjustments'; Status = $optimizedStatus; Detail = $optimizedDetail }
          )) {
            if ($entry.Status -and $entry.Status -ne 'uploaded' -and $entry.Status -notlike 'skipped_no_file') {
              Write-Host "::warning::Live Lens $($entry.Name) upload status=$($entry.Status) $($entry.Detail)"
            }
          }
