name: NBA Betting Daily Scheduler

on:
  workflow_dispatch: {}
  schedule:
    # Daily around early morning US/Eastern (UTC time).
    - cron: "5 11 * * *"
    # Pregame props refresh every 20 minutes during likely NBA windows (UTC).
    - cron: "7,27,47 15-23 * * *"
    - cron: "7,27,47 0-3 * * *"

concurrency:
  group: nbabetting-daily-scheduler
  cancel-in-progress: true

env:
  # Prefer repo secrets, but default the base URL to the known Render service.
  NBA_BETTING_BASE_URL: ${{ secrets.RENDER_URL || secrets.NBA_BETTING_BASE_URL || 'https://nba-betting-5qgf.onrender.com' }}
  NBA_BETTING_CRON_TOKEN: ${{ secrets.CRON_TOKEN || secrets.NBA_BETTING_CRON_TOKEN }}

jobs:
  refresh-oddsapi-props-pregame:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '7,27,47 15-23 * * *' || github.event.schedule == '7,27,47 0-3 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Preflight (config + cron ping)
        run: |
          set -euo pipefail
          test -n "${NBA_BETTING_BASE_URL}" || (echo 'Missing NBA_BETTING_BASE_URL' && exit 1)
          test -n "${NBA_BETTING_CRON_TOKEN}" || (echo 'Missing NBA_BETTING_CRON_TOKEN (set CRON_TOKEN or NBA_BETTING_CRON_TOKEN secret)' && exit 1)
          URL="${NBA_BETTING_BASE_URL%/}/api/cron/ping"
          echo "[preflight] GET $URL"
          for i in 1 2 3 4 5 6; do
            set +e
            http=$(curl -sS -o resp.txt -w "%{http_code}" -H "Authorization: Bearer ${NBA_BETTING_CRON_TOKEN}" "$URL")
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then http="000"; fi
            cat resp.txt || true
            if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
              exit 0
            fi
            echo "Preflight attempt $i -> HTTP $http" >&2
            if [ "$http" = "000" ] || [ "$http" -ge 500 ] || [ "$http" = "429" ]; then
              sleep $((i * 5))
              continue
            fi
            exit 1
          done
          exit 1
      - name: Refresh OddsAPI props snapshot + edges + export (today)
        run: |
          set -euo pipefail
          DATE=$(date -u +%F)
          URL="${NBA_BETTING_BASE_URL%/}/api/cron/refresh-oddsapi-props?date=${DATE}&regions=us&edges=1&export=1&sync=1"
          echo "GET $URL"
          for i in 1 2 3 4 5 6; do
            set +e
            http=$(curl -sS -o resp.txt -w "%{http_code}" -H "Authorization: Bearer ${NBA_BETTING_CRON_TOKEN}" "$URL")
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then http="000"; fi
            cat resp.txt || true
            if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
            python3 -c '
          import json
          import pathlib
          import sys

          resp_path = pathlib.Path("resp.txt")
          try:
            payload = json.loads(resp_path.read_text(encoding="utf-8", errors="ignore") or "{}")
          except Exception as exc:
            print(f"Invalid JSON response: {exc}")
            try:
              print(resp_path.read_text(encoding="utf-8", errors="ignore")[:8000])
            except Exception:
              pass
            sys.exit(1)

          def as_int(value, default=None):
            try:
              if value is None:
                return default
              return int(value)
            except Exception:
              return default

          if payload.get("error"):
            print("Refresh returned error payload")
            print(json.dumps(payload, indent=2)[:8000])
            sys.exit(1)

          rc_snapshot = as_int(payload.get("rc_snapshot"), 1)
          rc_edges = as_int(payload.get("rc_edges"), None)
          rc_export = as_int(payload.get("rc_export"), None)
          snapshot_rows = as_int(payload.get("snapshot_rows"), 0) or 0
          edges_rows = as_int(payload.get("edges_rows"), 0)
          recs_rows = as_int(payload.get("recs_rows"), 0)

          if rc_snapshot != 0:
            print("Snapshot step failed")
            print(json.dumps(payload, indent=2)[:8000])
            sys.exit(1)

          if snapshot_rows <= 0:
            print("No current props snapshot rows for this date; treating as clean no-op")
            print(json.dumps(payload, indent=2)[:8000])
            sys.exit(0)

          if rc_edges not in (None, 0):
            print("Edges step failed")
            print(json.dumps(payload, indent=2)[:8000])
            sys.exit(1)

          if rc_export not in (None, 0):
            print("Export step failed")
            print(json.dumps(payload, indent=2)[:8000])
            sys.exit(1)

          if edges_rows is not None and int(edges_rows) <= 0:
            print("Edges rows are zero after a non-empty snapshot")
            print(json.dumps(payload, indent=2)[:8000])
            sys.exit(1)

          if recs_rows is not None and int(recs_rows) <= 0:
            print("Recommendations rows are zero after export; continuing")

          print("Refresh completed ok")
          print(json.dumps({
            "snapshot_rows": snapshot_rows,
            "edges_rows": edges_rows,
            "recs_rows": recs_rows,
            "snapshot_path": payload.get("snapshot_path"),
            "edges_path": payload.get("edges_path"),
            "recs_path": payload.get("recs_path"),
          }, indent=2))
          '
              exit 0
            fi
            echo "Request attempt $i -> HTTP $http" >&2
            if [ "$http" = "000" ] || [ "$http" -ge 500 ] || [ "$http" = "429" ]; then
              sleep $((i * 5))
              continue
            fi
            exit 1
          done
          exit 1

  assess-oddsapi-daily:
