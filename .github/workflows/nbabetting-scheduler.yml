      - name: Warm summary cache
        run: |
          set -euo pipefail
          # Hitting summary once populates recommendations_summary.json on the server
          URL="${NBA_BETTING_BASE_URL%/}/recommendations?format=json&view=summary"
          echo "GET $URL"
          for i in 1 2 3 4 5 6; do
