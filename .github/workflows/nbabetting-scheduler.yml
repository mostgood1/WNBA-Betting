            if [ "$rc" -ne 0 ]; then http="000"; fi
            cat resp.txt || true
            if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
              exit 0
            fi
            echo "Preflight attempt $i -> HTTP $http" >&2
            if [ "$http" = "000" ] || [ "$http" -ge 500 ] || [ "$http" = "429" ]; then
              sleep $((i * 5))
              continue
            fi
            exit 1
          done
          exit 1
      - name: Call reconcile-games (yesterday)
        run: |
          set -euo pipefail
          DATE=$(date -u -d yesterday +%F)
          URL="${NBA_BETTING_BASE_URL%/}/api/cron/reconcile-games?date=${DATE}"
          echo "GET $URL"
          for i in 1 2 3 4 5 6; do
            set +e
            http=$(curl -sS -o resp.txt -w "%{http_code}" -H "Authorization: Bearer ${NBA_BETTING_CRON_TOKEN}" "$URL")
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then http="000"; fi
            cat resp.txt || true
            if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
              exit 0
            fi
            echo "Request attempt $i -> HTTP $http" >&2
            if [ "$http" = "000" ] || [ "$http" -ge 500 ] || [ "$http" = "429" ]; then
              sleep $((i * 5))
              continue
            fi
            exit 1
          done
          exit 1

  daily-run-all:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '5 11 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Preflight (config + cron ping)
        run: |
          set -euo pipefail
          test -n "${NBA_BETTING_BASE_URL}" || (echo 'Missing NBA_BETTING_BASE_URL' && exit 1)
          test -n "${NBA_BETTING_CRON_TOKEN}" || (echo 'Missing NBA_BETTING_CRON_TOKEN (set CRON_TOKEN or NBA_BETTING_CRON_TOKEN secret)' && exit 1)
