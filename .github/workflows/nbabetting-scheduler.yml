            cat resp.txt || true
            if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
              exit 0
            fi
            echo "Request attempt $i -> HTTP $http" >&2
            if [ "$http" = "000" ] || [ "$http" -ge 500 ] || [ "$http" = "429" ]; then
              sleep $((i * 5))
              continue
            fi
            exit 1
          done
          exit 1
      - name: Warm summary cache
        run: |
          set -euo pipefail
          # Hitting summary once populates recommendations_summary.json on the server
          URL="${NBA_BETTING_BASE_URL%/}/recommendations?format=json&view=summary"
          echo "GET $URL"
          for i in 1 2 3 4 5 6; do
            set +e
            http=$(curl -sS -o /dev/null -w "%{http_code}" "$URL")
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then http="000"; fi
            if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
              exit 0
            fi
            echo "Warm cache attempt $i -> HTTP $http" >&2
            if [ "$http" = "000" ] || [ "$http" -ge 500 ] || [ "$http" = "429" ]; then
              sleep $((i * 5))
              continue
            fi
            exit 1
          done
          exit 1
