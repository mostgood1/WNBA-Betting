name: NBA Betting Daily Scheduler

on:
  workflow_dispatch: {}

jobs:
  reconcile-yesterday:
    runs-on: ubuntu-latest
    steps:
      - name: Call reconcile-games (yesterday)
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          set -e
          DATE=$(date -u -d yesterday +%F)
          curl -fsS -H "Authorization: Bearer ${CRON_TOKEN}" "${RENDER_URL}/api/cron/reconcile-games?date=${DATE}"

  daily-run-all:
    runs-on: ubuntu-latest
    steps:
      - name: Call run-all (push artifacts)
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          set -e
          curl -fsS -H "Authorization: Bearer ${CRON_TOKEN}" "${RENDER_URL}/api/cron/run-all?push=1"
      - name: Warm summary cache
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          set -e
          # Hitting summary once populates recommendations_summary.json on the server
          curl -fsS "${RENDER_URL}/recommendations?format=json&view=summary" -o /dev/null
