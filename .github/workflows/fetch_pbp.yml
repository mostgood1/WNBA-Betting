name: Fetch PBP outcomes via R

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
  schedule:
    - cron: "15 6 * * *"  # daily at 06:15 UTC

jobs:
  fetch-pbp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('optparse','dplyr','lubridate','readr','rvest','stringr','httr'), repos='https://cloud.r-project.org')"
          Rscript -e "install.packages('hoopR', repos='https://cloud.r-project.org')"

      - name: Ensure R PBP script is present (create if missing)
        shell: bash
        run: |
          set -e
          mkdir -p scripts
          if [ ! -f scripts/pbp_fetch_nbastatr.R ]; then
            cat > scripts/pbp_fetch_nbastatr.R << 'EOF'
            #!/usr/bin/env Rscript
            suppressPackageStartupMessages({
              library(optparse); library(dplyr); library(lubridate); library(readr)
            })

            opt <- OptionParser(option_list=list(
              make_option(c("--date"), type="character", default=NULL)
            )) |> parse_args()

            if (is.null(opt$date)) { stop("--date is required") }
            d <- as.Date(opt$date)
            season <- unique(year(d) + (month(d) >= 7))

            ok <- requireNamespace("hoopR", quietly = TRUE)
            if (!ok) { stop("hoopR not available") }
            suppressPackageStartupMessages(library(hoopR))

            pbp <- tryCatch({ hoopR::load_nba_pbp(seasons=season) }, error=function(e) NULL)
            if (is.null(pbp) || nrow(pbp)==0) { quit(status=0) }

            # find a date column
            date_col <- intersect(c("game_date","dateGame","gameDate","game_date_time"), names(pbp))
            if (length(date_col)==0) { quit(status=0) }
            dd <- as.Date(pbp[[date_col[1]]])
            pbp <- pbp[dd == d, , drop=FALSE]
            if (nrow(pbp)==0) { quit(status=0) }

            dir.create(file.path("data","processed","pbp"), recursive = TRUE, showWarnings = FALSE)

            # normalize minimum columns
            nm <- names(pbp)
            col_game <- intersect(c("game_id","gameId","game_id_clean"), nm)
            if (length(col_game)==0) col_game <- "game_id"
            if (!(col_game %in% nm)) {
              if ("game_id" %in% nm) {
                pbp[[col_game]] <- as.character(pbp$game_id)
              } else if ("gameId" %in% nm) {
                pbp[[col_game]] <- as.character(pbp$gameId)
              } else {
                pbp[[col_game]] <- as.character(NA)
              }
            }

            col_period <- intersect(c("period","qtr","quarter"), nm)
            if (length(col_period)==0) { pbp$period <- NA_integer_ } else { names(pbp)[names(pbp)==col_period[1]] <- "period" }

            col_clock <- intersect(c("clock","time_remaining","remaining_time"), nm)
            if (length(col_clock)==0) { pbp$clock <- NA_character_ } else { names(pbp)[names(pbp)==col_clock[1]] <- "clock" }

            col_desc <- intersect(c("description","play_desc","msg"), nm)
            if (length(col_desc)==0) { pbp$description <- NA_character_ } else { names(pbp)[names(pbp)==col_desc[1]] <- "description" }

            out_min <- pbp |> select(all_of(c(col_game, "period","clock","description")))

            ymd <- format(d, "%Y-%m-%d")
            readr::write_csv(out_min, file.path("data","processed", sprintf("pbp_%s.csv", ymd)))

            by_game <- split(out_min, out_min[[col_game]])
            for (gid in names(by_game)){
              df <- by_game[[gid]]
              if (!is.null(df) && nrow(df)>0){
                readr::write_csv(df, file.path("data","processed","pbp", sprintf("pbp_%s.csv", gid)))
              }
            }
            EOF
            chmod +x scripts/pbp_fetch_nbastatr.R
          fi

      - name: Compute date range
        id: dates
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ] && [ -n "${{ github.event.inputs.end_date }}" ]; then
            START="${{ github.event.inputs.start_date }}"
            END="${{ github.event.inputs.end_date }}"
          else
            # default: yesterday UTC only
            START=$(date -u -d 'yesterday' +%F)
            END=$START
          fi
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END" >> $GITHUB_OUTPUT

      - name: Debug repo contents
        shell: bash
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "--- scripts/ ---"
          ls -la scripts || true

      - name: Run R PBP fetcher for range
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          START=${{ steps.dates.outputs.start }}
          END=${{ steps.dates.outputs.end }}
          echo "Fetching PBP from $START to $END"
          cur="$START"
          while [ "$(date -u -d "$cur" +%s)" -le "$(date -u -d "$END" +%s)" ]; do
            echo "Fetching $cur"
            Rscript scripts/pbp_fetch_nbastatr.R --date "$cur" || true
            cur=$(date -u -d "$cur + 1 day" +%F)
          done

      - name: Commit and push CSV outputs
        shell: bash
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A data/processed || true
          git status --porcelain
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): add/update PBP outcomes via GH Action [skip ci]"
          git push
