name: "NBA Betting: Reconcile"

on:
  workflow_dispatch: {}
  schedule:
    - cron: '5 10 * * *'

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.NBA_BETTING_BASE_URL }}
      CRON_TOKEN: ${{ secrets.NBA_BETTING_CRON_TOKEN }}
    steps:
      - name: Validate config
        run: |
          test -n "$BASE_URL" || (echo 'Missing secret NBA_BETTING_BASE_URL' && exit 1)
          test -n "$CRON_TOKEN" || (echo 'Missing secret NBA_BETTING_CRON_TOKEN' && exit 1)

      - name: Health check
        run: |
          curl -fsS "$BASE_URL/health" || (echo 'Health check failed' && exit 1)

      - name: Reconcile games (yesterday)
        run: |
          D=$(date -u -d yesterday +%F || date -u -v-1d +%F)
          curl -fsS -X POST "$BASE_URL/api/cron/reconcile-games?date=$D&push=1" -H "Authorization: Bearer $CRON_TOKEN"
