services:
  - type: web
    name: nba-betting
    env: python
    plan: free
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    autoDeploy: true
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: src
      - key: WEB_CONCURRENCY
        value: "1"
      - key: WEB_THREADS
        value: "4"
      # Secrets (set values in Render dashboard or via Blueprint instance; 'sync: false' preserves remote values)
      - key: ADMIN_KEY
        sync: false
      - key: CRON_TOKEN
        sync: false
      - key: GH_TOKEN
        sync: false
      - key: GIT_PAT
        sync: false
      - key: GH_NAME
        sync: false
      - key: GH_EMAIL
        sync: false
      - key: ODDS_API_KEY
        sync: false

# Note: Some Render accounts don’t support defining Cron Jobs in Blueprints yet.
# If you see errors like "field jobs not found" in the Blueprint editor, deploy just the Web Service
# using this file, then create Cron Jobs via the Render UI (New → Cron Job) with the commands below.
# Alternatively, use the provided GitHub Actions scheduler in .github/workflows/nbabetting-scheduler.yml.
