services:
  - type: web
    name: nba-betting
    env: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: src
      - key: WEB_CONCURRENCY
        value: "1"
      - key: WEB_THREADS
        value: "4"
      # Secrets (set values in Render dashboard or via Blueprint instance; 'sync: false' preserves remote values)
      - key: ADMIN_KEY
        sync: false
      - key: CRON_TOKEN
        sync: false
      - key: GH_TOKEN
        sync: false
      - key: GIT_PAT
        sync: false
      - key: GH_NAME
        sync: false
      - key: GH_EMAIL
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: RENDER_PUSH_ON_DEPLOY
        value: "1"  # commit/push refreshed odds/edges/recs on deploy (requires GH_TOKEN or GIT_PAT secret)

# Note: Some Render accounts don’t support defining Cron Jobs in Blueprints yet.
# If you see errors like "field jobs not found" in the Blueprint editor, deploy just the Web Service
# using this file, then create Cron Jobs via the Render UI (New → Cron Job) with the commands below.
# Alternatively, use the provided GitHub Actions scheduler in .github/workflows/nbabetting-scheduler.yml.

# Suggested Render Cron Jobs (create in Render UI):
# - Name: refresh-odds-today (every 15 minutes 15:00–23:59 UTC on game days)
#   Command: curl -fsS -H "Authorization: Bearer $CRON_TOKEN" "$RENDER_EXTERNAL_URL/api/cron/refresh-bovada?date=$(date -u +%F)"
# - Name: reconcile-yesterday (daily at 10:00 UTC)
#   Command: curl -fsS -H "Authorization: Bearer $CRON_TOKEN" "$RENDER_EXTERNAL_URL/api/cron/reconcile-games?date=$(date -u -d yesterday +%F)"
# - Name: composite-run-all (optional, daily at 11:00 UTC)
#   Command: curl -fsS -H "Authorization: Bearer $CRON_TOKEN" "$RENDER_EXTERNAL_URL/api/cron/run-all?push=1"
