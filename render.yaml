services:
  - type: web
    name: wnba-betting
    runtime: python
    # plan intentionally omitted to preserve Render dashboard plan (avoid accidental downgrades)
    autoDeployTrigger: commit
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: src
      - key: WEB_CONCURRENCY
        value: "1"
      - key: WEB_THREADS
        value: "1"
      # Reduce long-lived memory growth on small instances
      - key: GUNICORN_MAX_REQUESTS
        value: "75"
      - key: GUNICORN_MAX_REQUESTS_JITTER
        value: "25"

      # Cap large in-process caches (avoid Render 512MB OOM)
      - key: LIVE_PROCESSED_CACHE_MAX_ITEMS
        value: "24"
      - key: LIVE_ESPN_SUMMARY_CACHE_MAX_ITEMS
        value: "8"
      - key: LIVE_PBP_ACTIONS_CACHE_MAX_ITEMS
        value: "12"
      - key: LIVE_SIM_CACHE_MAX_ITEMS
        value: "16"
      - key: ALLOW_REMOTE_ARTIFACTS
        value: "1"
      - key: CONNECTED_CORRELATED_SCORING_ALPHA
        value: "0.2"
      - key: GITHUB_REPOSITORY
        value: mostgood1/WNBA-Betting
      - key: GIT_BRANCH
        value: main
      # Secrets (set values in Render dashboard or via Blueprint instance; 'sync: false' preserves remote values)
      - key: ADMIN_KEY
        sync: false
      - key: CRON_TOKEN
        sync: false
      - key: GH_TOKEN
        sync: false
      - key: GIT_PAT
        sync: false
      - key: GH_NAME
        sync: false
      - key: GH_EMAIL
        sync: false
      - key: ODDS_API_KEY
        sync: false

      # Live player props OddsAPI refresh throttles
      - key: LIVE_PLAYER_PROPS_ODDS_TTL_SEC
        value: "20"
      # Persist Live Lens runtime artifacts (signals/projections/tuning overrides)
      - key: NBA_LIVE_LENS_DIR
        value: /opt/render/project/data/live_lens
      # Persist data/raw + data/processed (OddsAPI/Bovada snapshots, props edges, recommendations)
      - key: WNBA_BETTING_DATA_ROOT
        value: /opt/render/project/data
      - key: ODDSAPI_PROPS_BACKGROUND_MODE
        value: "process"
      - key: REFRESH_PREDICT_PROPS_USE_SMART_SIM
        value: "0"
      - key: REFRESH_PREDICT_PROPS_CALIBRATE_PLAYER
        value: "0"
      - key: RENDER_PRESTART_REFRESH
        value: "0"  # opt-in prestart refresh/export (can be memory-heavy on small plans)
      - key: RENDER_PUSH_ON_DEPLOY
        value: "1"  # commit/push refreshed artifacts (requires RENDER_PRESTART_REFRESH=1 + GH_TOKEN/GIT_PAT)

    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 5

# Note: Some Render accounts don’t support defining Cron Jobs in Blueprints yet.
# If you see errors like "field jobs not found" in the Blueprint editor, deploy just the Web Service
# using this file, then create Cron Jobs via the Render UI (New → Cron Job) with the commands below.
# Alternatively, use the provided GitHub Actions scheduler in .github/workflows/nbabetting-scheduler.yml.

# Suggested Render Cron Jobs (create in Render UI):
# - Name: live-lens-tick (every 60 seconds, all day; cheap no-op when no games)
#   Env (Cron Job): WNBA_BETTING_BASE_URL=https://wnba-betting.onrender.com  WNBA_BETTING_CRON_TOKEN=<same as web service CRON_TOKEN>
#   Command: bash scripts/render_cron_call.sh "/api/cron/live-lens-tick?ttl=15&min_interval_sec=60&max_props_per_game=8&recent_window_sec=180"
# - Name: refresh-oddsapi-props (every 20 minutes during likely game windows)
#   Command: bash scripts/render_cron_call.sh "/api/cron/refresh-oddsapi-props?date=$(date -u +%F)&regions=us&edges=1&export=1"
# - Name: refresh-odds-today (every 15 minutes 15:00–23:59 UTC on game days)
#   Command: bash scripts/render_cron_call.sh "/api/cron/refresh-bovada?date=$(date -u +%F)"
# - Name: reconcile-yesterday (daily at 10:00 UTC)
#   Command: bash scripts/render_cron_call.sh "/api/cron/reconcile-games?date=$(date -u -d yesterday +%F)"
# - Name: live-lens-reports (daily at 10:15 UTC)
#   Command: bash scripts/render_cron_call.sh "/api/cron/live-lens-reports?date=$(date -u -d yesterday +%F)&rollup_days=30&min_denom=20"
# - Name: composite-run-all (optional, daily at 11:00 UTC)
#   Command: bash scripts/render_cron_call.sh "/api/cron/run-all?push=1"
