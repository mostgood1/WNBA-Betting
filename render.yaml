services:
  - type: web
    name: nba-betting
    env: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: src
      - key: WEB_CONCURRENCY
        value: "1"
      - key: WEB_THREADS
        value: "4"
      # Secrets (set values in Render dashboard or via Blueprint instance; 'sync: false' preserves remote values)
      - key: ADMIN_KEY
        sync: false
      - key: CRON_TOKEN
        sync: false
      - key: GH_TOKEN
        sync: false
      - key: GIT_PAT
        sync: false
      - key: GH_NAME
        sync: false
      - key: GH_EMAIL
        sync: false
      - key: ODDS_API_KEY
        sync: false

# Optional: scheduled jobs to mirror NHL automation. These call the app's cron endpoints.
cronJobs:
  # Hourly: build predictions and odds for today's slate, commit artifacts
  - name: nba-betting-predict-hourly
    schedule: "15 * * * *"  # at minute 15 every hour (UTC)
    env: docker
    plan: free
    image: alpine:3.19
    command: >-
      sh -lc "apk add --no-cache curl; curl -fsS -X POST \"$BASE_URL/api/cron/predict-date?push=1&skip_if_no_games=1&async=1\" -H \"Authorization: Bearer $CRON_TOKEN\""
    envVars:
      - key: BASE_URL
        fromService:
          name: nba-betting
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_TOKEN
        fromService:
          name: nba-betting
          type: web
          envVarKey: CRON_TOKEN

  # Daily: capture yesterday's closing lines, commit artifact
  - name: nba-betting-capture-closing-daily
    schedule: "35 12 * * *"  # 12:35 UTC daily (~morning ET)
    env: docker
    plan: free
    image: alpine:3.19
    command: >-
      sh -lc "apk add --no-cache curl coreutils; D=$(date -u -d yesterday +%F); curl -fsS -X POST \"$BASE_URL/api/cron/capture-closing?date=$D&push=1\" -H \"Authorization: Bearer $CRON_TOKEN\""
    envVars:
      - key: BASE_URL
        fromService:
          name: nba-betting
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_TOKEN
        fromService:
          name: nba-betting
          type: web
          envVarKey: CRON_TOKEN

  # Daily: build reconciliation for yesterday, commit artifact
  - name: nba-betting-reconcile-daily
    schedule: "5 13 * * *"  # 13:05 UTC daily
    env: docker
    plan: free
    image: alpine:3.19
    command: >-
      sh -lc "apk add --no-cache curl coreutils; \
      D=$(date -u -d yesterday +%F); \
      curl -fsS -X POST \"$BASE_URL/api/cron/predict-date?date=$D&push=1&skip_if_no_games=1&async=1\" -H \"Authorization: Bearer $CRON_TOKEN\" && \
      curl -fsS -X POST \"$BASE_URL/api/cron/reconcile-games?date=$D&push=1\" -H \"Authorization: Bearer $CRON_TOKEN\""
    envVars:
      - key: BASE_URL
        fromService:
          name: nba-betting
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_TOKEN
        fromService:
          name: nba-betting
          type: web
          envVarKey: CRON_TOKEN

  # Daily: run the app's daily-update orchestration (lightweight; add push=1 to commit any outputs)
  - name: nba-betting-daily-update
    schedule: "0 12 * * *"  # 12:00 UTC daily
    env: docker
    plan: free
    image: alpine:3.19
    command: >-
      sh -lc "apk add --no-cache curl; curl -fsS -X POST \"$BASE_URL/api/cron/daily-update?push=1\" -H \"Authorization: Bearer $CRON_TOKEN\""
    envVars:
      - key: BASE_URL
        fromService:
          name: nba-betting
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_TOKEN
        fromService:
          name: nba-betting
          type: web
          envVarKey: CRON_TOKEN

  # Daily: comprehensive chain (predict -> odds -> reconcile -> props actuals -> props edges)
  - name: nba-betting-run-all-daily
    schedule: "15 12 * * *"  # 12:15 UTC daily
    env: docker
    plan: free
    image: alpine:3.19
    command: >-
      sh -lc "apk add --no-cache curl; curl -fsS -X POST \"$BASE_URL/api/cron/run-all?push=1\" -H \"Authorization: Bearer $CRON_TOKEN\""
    envVars:
      - key: BASE_URL
        fromService:
          name: nba-betting
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_TOKEN
        fromService:
          name: nba-betting
          type: web
          envVarKey: CRON_TOKEN

  # Weekly: refresh rosters for current season to improve player ID resolution
  - name: nba-betting-refresh-rosters-weekly
    schedule: "0 6 * * 1"  # Mondays 06:00 UTC
    env: docker
    plan: free
    image: alpine:3.19
    command: >-
      sh -lc "apk add --no-cache curl; curl -fsS -X POST \"$BASE_URL/api/cron/fetch-rosters?season=2025-26&push=1\" -H \"Authorization: Bearer $CRON_TOKEN\""
    envVars:
      - key: BASE_URL
        fromService:
          name: nba-betting
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_TOKEN
        fromService:
          name: nba-betting
          type: web
          envVarKey: CRON_TOKEN

  # Daily: precompute props predictions for today's slate so /props loads instantly
  - name: nba-betting-props-predictions-daily
    schedule: "5 12 * * *"  # 12:05 UTC daily
    env: docker
    plan: free
    image: alpine:3.19
    command: >-
      sh -lc "apk add --no-cache curl; curl -fsS -X POST \"$BASE_URL/api/cron/props-predictions?push=1&slate_only=1&calibrate=1&calib_window=7&async=1\" -H \"Authorization: Bearer $CRON_TOKEN\""
    envVars:
      - key: BASE_URL
        fromService:
          name: nba-betting
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CRON_TOKEN
        fromService:
          name: nba-betting
          type: web
          envVarKey: CRON_TOKEN
